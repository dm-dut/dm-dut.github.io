<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>东北财经大学学术期刊目录查询系统（2025修订）</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <h1>东北财经大学学术期刊目录查询系统</h1>
        <p>2025 年修订版；支持中文期刊与外文期刊分表查询</p>
      </div>
      <div class="summary">
        <span id="totalCount">加载中...</span>
      </div>
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="cn">中文期刊目录</button>
      <button class="tab" data-tab="en">外文期刊目录</button>
    </nav>

    <section class="controls">
      <div class="control-group grow">
        <label for="keywordInput">关键词匹配查询</label>
        <input id="keywordInput" type="text" placeholder="输入期刊名、主办单位、ISSN 等关键词；多个关键词用空格分隔" />
      </div>
      <div class="control-group">
        <label for="rankFilter">级别筛选</label>
        <select id="rankFilter">
          <option value="">全部级别</option>
        </select>
      </div>
      <div class="control-group">
        <label>&nbsp;</label>
        <button id="resetBtn">重置</button>
      </div>
    </section>

    <section class="status">
      <span id="activeInfo"></span>
      <span id="resultInfo"></span>
    </section>

    <section class="table-wrap">
      <table id="journalTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
