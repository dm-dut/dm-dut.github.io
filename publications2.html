<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN" "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <link rel="shortcut icon" href="paper_dragon.ico">
    <link rel="stylesheet" type="text/css" href="style.css" />
    <title>Zhen Zhang's Publications</title>
    <script type="text/javascript" src="https://code.jquery.com/jquery-1.11.1.min.js"></script>

    <style type="text/css">
        /* --- 1. 标题风格：复刻浅蓝色大字号 + 下划线 --- */
        h2 {
            font-size: 1.8em;
            color: #527bbd; /* 浅蓝色 */
            font-weight: bold;
            border-bottom: 2px solid #527bbd;
            padding-bottom: 5px;
            margin: 15px 0 10px 0; /* 统一间距，收紧分类下的空白 */
            clear: both;
        }

        /* --- 2. 论文条目与精确间距控制 --- */
        #main_publication_area p {
            margin: 0.5em 0; /* 缩小基础间距 */
            line-height: 1.4;
            text-align: justify;
        }

        /* 每一类第一条记录的段前间距 */
        #main_publication_area h2 + p {
            margin-top: 25px !important;
        }

        /* --- 3. 姓名样式：纯黑加粗 --- */
        .my_name {
            color: #000 !important;
            font-weight: bold !important;
        }

        /* --- 4. New 图标视觉贴合修正 --- */
        .new_icon {
            vertical-align: middle;
            border: none;
            /* 视觉补偿：消除图片自带的微小边隙 */
            margin-left: -3px;
            margin-right: -1px;
            padding: 0;
        }
        /* --- 4. New 图标样式 --- */
        /*.new_icon {*/
        /*    vertical-align: middle;*/
        /*    margin: 0 8px;*/
        /*    border: none;*/
        /*}*/
    </style>
</head>

<body>
<h1 style="padding-left: 0.5em"><a href="index.html">Dr. Zhen Zhang's Homepage</a></h1>
<hr>

<table summary="Table for page layout." id="tlayout">
<tr valign="top">
  <td id="layout-menu">
    <div class="menu-item"><a href="index.html">Home</a></div>
    <div class="menu-item"><a href="publications.html">Publications</a></div>
    <div class="menu-item"><a href="service.html">Service</a></div>
    <div class="menu-item"><a href="grants.html">Grants</a></div>
    <div class="menu-item"><a href="award.html">Awards</a></div>
    <div class="menu-item"><a href="groups.html">Group</a></div>
    <div class="menu-item"><a href="news.html">News</a></div>
  </td>

  <td id="layout-content">
    <div id="main_publication_area">
        正在加载发表记录...
    </div>

    <div id="footer">
        <p>Last updated: <span id="update_time"></span></p>
        <p>&copy; 2014-2026 Zhen Zhang</p>
    </div>
  </td>
</tr>
</table>

<script type="text/javascript">
$(function() {
    // 动态生成具体更新时间
    var now = new Date();
    var timeStr = now.getFullYear() + "-" + (now.getMonth()+1) + "-" + now.getDate() + " " +
                  now.getHours().toString().padStart(2,'0') + ":" +
                  now.getMinutes().toString().padStart(2,'0');
    $("#update_time").text(timeStr);

    $.getJSON("papers.json", function(data) {
        var html = "";
        var total = 0;
        $.each(data, function(c, l) { total += l.length; });
        var currentIdx = total;

        var categories = ["Monograph", "Journal Articles", "Conference Papers"];

        $.each(categories, function(i, cat) {
            if(data[cat] && data[cat].length > 0) {
                html += '<h2>' + cat + '</h2>';
                $.each(data[cat], function(idx, p) {
                    var auths = p.authors.replace(/Zhen Zhang/g, '<span class="my_name">Zhen Zhang</span>');
                    var idxStr = (currentIdx < 10 ? '0'+currentIdx : currentIdx);

                    // 1. 编号部分
                    html += '<p> [' + idxStr + ']';

                    // 2. New 标签判断（图书不加，其余前10篇加）
                    if(currentIdx > (total - 10) && cat !== "Monograph") {
                        html += '<img src="images/new.gif" class="new_icon" alt="new" />';
                    } else {
                        // 非 New 记录，编号后加空格
                        html += '&nbsp;';
                    }

                    // 3. 作者
                    html += auths + '. ';

                    // 4. 标题与标点 (期刊用逗号，会议用句号)
                    var titlePunctuation = (cat === "Journal Articles") ? ", " : ". ";
                    html += p.title + titlePunctuation;

                    // 5. 内容详情
                    if(cat === "Journal Articles") {
                        html += '<em>' + p.source + '</em>';
                        if(p.vol) html += ', ' + p.vol;
                        if(p.no) html += '(' + p.no + ')';
                        if(p.page) html += ', ' + p.page;
                        if(p.year) html += ', ' + p.year;
                        // 期刊保留文本显示 DOI
                        if(p.doi) html += '. DOI: ' + p.doi;
                    } else if(cat === "Conference Papers") {
                        html += 'In <em>Proceedings of ' + p.source + '</em>';
                        if(p.addr) html += ', ' + p.addr;
                        if(p.date) html += ', ' + p.date;
                        // 会议论文：有 DOI 则不显示文本，直接在后面加 PDF 链接
                    } else if(cat === "Monograph") {
                        html += '<em>' + p.source + '</em>';
                        if(p.isbn) html += ', ISBN: ' + p.isbn;
                        html += ', ' + p.year;
                    }
                    html += '. ';

                    // 6. 各种 Note 标注
                    var notes = [];
                    if(p.metrics) notes.push(p.metrics);
                    if(p.esi_high) notes.push('<strong>ESI Highly Cited Paper</strong>');
                    if(p.esi_hot) notes.push('<strong>ESI Hot Paper</strong>');
                    if(p.note_en) notes.push('<strong>' + p.note_en + '</strong>');
                    if(notes.length > 0) html += '(' + notes.join(", ") + ') ';

                    // 6. PDF 链接处理（期刊显示，会议若有 DOI 也显示图标但不显文本）
                    if(p.doi && (cat === "Journal Articles" || cat === "Conference Papers")) {
                        var link = p.doi.startsWith('http') ? p.doi : 'https://doi.org/' + p.doi;
                        html += '<a href="' + link + '" target="_blank"><img src="images/iconPdf.png" width="23" height="24" style="vertical-align:middle;margin-left:5px;" /></a>';
                    }

                    html += '</p>';
                    currentIdx--;
                });
            }
        });
        $("#main_publication_area").html(html);
    });
});
</script>
</body>
</html>
