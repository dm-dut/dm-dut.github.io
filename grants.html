<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>期刊目录查询系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        /* 基础布局优化 */
        body { background-color: #f1f3f5; font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 10px; overflow: hidden; height: 100vh; }
        .main-card { background: #fff; max-width: 1600px; margin: 0 auto; height: calc(100vh - 20px); border-radius: 12px; padding: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; flex-direction: column; }

        /* 顶部搜索 */
        .top-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; flex-shrink: 0; }
        .search-box { flex-grow: 1; border-left: 5px solid #0d6efd; border-radius: 6px; }

        /* 全局检索结果区 - 强化显示完整性 */
        #globalResult { max-height: 200px; overflow-y: auto; margin-bottom: 10px; border: 2px solid #0d6efd; border-radius: 8px; display: none; flex-shrink: 0; }
        .global-table { table-layout: fixed; width: 100%; margin: 0; border-collapse: collapse; }
        .global-table th { background: #0d6efd !important; color: #fff; position: sticky; top: 0; padding: 8px; font-size: 0.9rem; }
        .global-table td { padding: 8px; border-bottom: 1px solid #eee; vertical-align: middle; word-wrap: break-word; overflow-wrap: break-word; white-space: normal !important; }

        /* 全局表列宽比例 */
        .g-w-db { width: 60px; }
        .g-w-name { width: 45%; } /* 全称给最大 */
        .g-w-field { width: 30%; } 
        .g-w-rank { width: 70px; text-align: center; }
        .g-w-if { width: 70px; text-align: center; }

        /* 主表容器 - 强制撑满 */
        .tab-content { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; }
        .tab-pane.active { display: flex; flex-direction: column; height: 100%; }
        .table-wrap { flex-grow: 1; overflow-y: auto; border: 1px solid #eee; border-radius: 4px; }

        /* 主表格样式 - 彻底解决显示不全 */
        .table { table-layout: fixed; width: 100%; margin: 0; }
        .table th { background: #f8f9fa; position: sticky; top: 0; z-index: 5; padding: 10px; font-size: 0.95rem; border-bottom: 2px solid #dee2e6; }
        .table td { 
            padding: 10px; 
            vertical-align: middle; 
            line-height: 1.4;
            word-wrap: break-word; 
            overflow-wrap: break-word; 
            white-space: normal !important; /* 强制允许换行，不截断 */
        }

        /* CCF 主表列宽锁定比例 */
        .ccf-col-abbr { width: 80px; font-size: 0.85rem; color: #666; }
        .ccf-col-full { width: 45%; font-weight: 600; color: #222; }
        .ccf-col-cat { width: 25%; color: #444; }
        .ccf-col-rank { width: 65px; text-align: center; }
        .ccf-col-if { width: 65px; text-align: center; }

        /* 筛选栏压缩 */
        .filter-bar { background: #f8f9fa; padding: 8px; border-radius: 6px; margin-bottom: 8px; flex-shrink: 0; border: 1px solid #eee; }
        .filter-bar label { font-size: 0.8rem; color: #888; font-weight: bold; margin-bottom: 2px; display: block; }
        .filter-bar select, .filter-bar input { height: 32px; font-size: 0.95rem; padding: 2px 8px; }

        .table-hover tbody tr:hover { background-color: #f1f7ff !important; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="top-bar">
        <h2 class="m-0">期刊检索</h2>
        <div class="search-box input-group input-group-sm">
            <input type="text" id="globalSearchInput" class="form-control" placeholder="输入关键字（CCF将显示全称，自动折行）..." onkeyup="if(event.keyCode===13) executeGlobalSearch()">
            <button class="btn btn-primary px-4" onclick="executeGlobalSearch()">全局检索</button>
        </div>
    </div>

    <div id="globalResult"></div>

    <ul class="nav nav-tabs" id="myTab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#panel-ajg">AJG</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#panel-ccf">CCF 2026</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#panel-fms">FMS</button></li>
    </ul>

    <div class="tab-content" id="myTabContent">
        <div class="tab-pane fade show active" id="panel-ajg">
            <div class="filter-bar row g-2 m-0">
                <div class="col-4"><label>搜索</label><input type="text" id="search-ajg" class="form-control" oninput="filterTable('ajg')"></div>
                <div class="col-4"><label>学科</label><select id="field-ajg" class="form-select" onchange="filterTable('ajg')"><option value="">全部</option></select></div>
                <div class="col-4"><label>级别</label><select id="rank-ajg" class="form-select" onchange="filterTable('ajg')"><option value="">全部</option></select></div>
            </div>
            <div class="table-wrap"><table class="table table-hover" id="table-ajg"><thead></thead><tbody></tbody></table></div>
        </div>

        <div class="tab-pane fade" id="panel-ccf">
            <div class="filter-bar row g-2 m-0">
                <div class="col-4"><label>全称/简称搜索</label><input type="text" id="search-ccf" class="form-control" oninput="filterTable('ccf')"></div>
                <div class="col-4"><label>领域</label><select id="field-ccf" class="form-select" onchange="filterTable('ccf')"><option value="">全部</option></select></div>
                <div class="col-4"><label>级别</label><select id="rank-ccf" class="form-select" onchange="filterTable('ccf')"><option value="">全部</option></select></div>
            </div>
            <div class="table-wrap">
                <table class="table table-hover" id="table-ccf">
                    <thead>
                        <tr>
                            <th class="ccf-col-abbr">简称</th>
                            <th class="ccf-col-full">期刊全称</th>
                            <th class="ccf-col-cat">研究领域</th>
                            <th class="ccf-col-rank">级别</th>
                            <th class="ccf-col-if">IF</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="tab-pane fade" id="panel-fms">
            <div class="filter-bar row g-2 m-0">
                <div class="col-4"><label>名称</label><input type="text" id="search-fms" class="form-control" oninput="filterTable('fms')"></div>
                <div class="col-4"><label>学科</label><select id="field-fms" class="form-select" onchange="filterTable('fms')"><option value="">全部</option></select></div>
                <div class="col-4"><label>级别</label><select id="rank-fms" class="form-select" onchange="filterTable('fms')"><option value="">全部</option></select></div>
            </div>
            <div class="table-wrap"><table class="table table-hover" id="table-fms"><thead></thead><tbody></tbody></table></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let dataAJG = [], dataCCF = [], dataFMS = [];

async function loadData() {
    try {
        const [r1, r2, r3] = await Promise.all([fetch('data/ajg.json'), fetch('data/ccf.json'), fetch('data/fms.json')]);
        dataAJG = await r1.json(); dataCCF = await r2.json(); dataFMS = await r3.json();
        renderTable('ajg', dataAJG, ['Journal Title', 'Field', 'AJG 2024', '影响因子']);
        renderCCF(dataCCF);
        renderTable('fms', dataFMS, ['期刊名称', '学科', 'FMS等级2025', '影响因子']);
        initFilters();
    } catch (e) { console.error(e); }
}

function executeGlobalSearch() {
    const q = document.getElementById('globalSearchInput').value.toLowerCase();
    const res = document.getElementById('globalResult');
    if (!q) { res.style.display="none"; return; }
    res.style.display="block";

    const match = (d, keys) => d.filter(i => keys.some(k => String(i[k]||'').toLowerCase().includes(q)));
    const rA = match(dataAJG, ['Journal Title']), rC = match(dataCCF, ['全称', '简称']), rF = match(dataFMS, ['期刊名称']);

    let h = `<table class="global-table"><thead><tr><th class="g-w-db">来源</th><th class="g-w-name">期刊全称</th><th class="g-w-field">分类</th><th class="g-w-rank">级别</th><th class="g-w-if">IF</th></tr></thead><tbody>`;
    const add = (list, tag, cls) => list.forEach(i => {
        const name = tag === 'CCF' ? i['全称'] : (i['Journal Title'] || i['期刊名称']);
        const rank = i['AJG 2024'] || i['级别'] || i['FMS等级2025'] || i['FMS等级 2025'] || '-';
        h += `<tr><td><span class="badge ${cls}">${tag}</span></td><td><b>${name}</b></td><td>${i['Field']||i['分类']||i['学科']||'-'}</td><td class="text-center text-primary fw-bold">${rank}</td><td class="text-center">${i['影响因子']||'-'}</td></tr>`;
    });
    add(rA, 'AJG', 'bg-dark'); add(rC, 'CCF', 'bg-success'); add(rF, 'FMS', 'bg-warning text-dark');
    res.innerHTML = h + `</tbody></table>`;
}

function renderCCF(list) {
    const b = document.querySelector('#table-ccf tbody');
    b.innerHTML = list.map(i => `<tr><td class="ccf-col-abbr">${i['简称']||'-'}</td><td class="ccf-col-full">${i['全称']||'-'}</td><td class="ccf-col-cat">${i['分类']||'-'}</td><td class="ccf-col-rank"><span class="text-primary fw-bold">${i['级别']}</span></td><td class="ccf-col-if">${i['影响因子']}</td></tr>`).join('');
}

function renderTable(id, list, cols) {
    const h = document.querySelector(`#table-${id} thead`), b = document.querySelector(`#table-${id} tbody`);
    h.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr>`;
    b.innerHTML = list.map(row => `<tr>${cols.map(c => `<td>${row[c]||'-'}</td>`).join('')}</tr>`).join('');
}

function filterTable(id) {
    const s = document.getElementById(`search-${id}`).value.toLowerCase();
    const f = document.getElementById(`field-${id}`).value;
    const r = document.getElementById(`rank-${id}`).value;
    const src = id==='ajg'?dataAJG : (id==='ccf'?dataCCF:dataFMS);
    const keys = id==='ajg'?['Journal Title'] : (id==='ccf'?['全称','简称']:['期刊名称']);
    const fk = id==='ajg'?'Field':(id==='ccf'?'分类':'学科'), rk = id==='ajg'?'AJG 2024':(id==='ccf'?'级别':'FMS等级2025');
    
    const res = src.filter(i => keys.some(k => String(i[k]||'').toLowerCase().includes(s)) && (!f || i[fk]===f) && (!r || (i[rk]||i['FMS等级 2025'])===r));
    if(id==='ccf') renderCCF(res); else renderTable(id, res, id==='ajg'?['Journal Title','Field','AJG 2024','影响因子']:['期刊名称','学科','FMS等级2025','影响因子']);
}

function initFilters() {
    const confs = [{id:'ajg', d:dataAJG, f:'Field', r:'AJG 2024'}, {id:'ccf', d:dataCCF, f:'分类', r:'级别'}, {id:'fms', d:dataFMS, f:'学科', r:'FMS等级2025'}];
    confs.forEach(c => {
        const fs = document.getElementById(`field-${c.id}`), rs = document.getElementById(`rank-${c.id}`);
        [...new Set(c.d.map(i => i[c.f]))].filter(Boolean).sort().forEach(v => fs.add(new Option(v,v)));
        [...new Set(c.d.map(i => i[c.r] || i['FMS等级2025']))].filter(Boolean).sort().forEach(v => rs.add(new Option(v,v)));
    });
}
window.onload = loadData;
</script>
</body>
</html>
