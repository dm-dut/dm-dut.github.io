<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>期刊目录查询系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        /* 1. 基础布局 */
        body {
            background-color: #f1f3f5;
            font-family: "Segoe UI", system-ui, sans-serif;
            margin: 0; padding: 10px; overflow: hidden; height: 100vh;
        }

        .main-card {
            background: #fff; max-width: 1600px; margin: 0 auto;
            height: calc(100vh - 20px); border-radius: 12px;
            padding: 15px 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex; flex-direction: column;
        }

        /* 2. 顶部搜索 */
        .top-bar { display: flex; align-items: center; gap: 20px; margin-bottom: 10px; flex-shrink: 0; }
        h2 { font-size: 1.4rem; font-weight: bold; margin: 0; color: #0d6efd; white-space: nowrap; }
        .search-box { flex-grow: 1; background: #f8fbff; border: 1px solid #dee2e6; border-left: 5px solid #0d6efd; border-radius: 6px; padding: 4px 12px; }

        /* 3. 全局检索结果区优化 */
        #globalResult {
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 15px;
            border-radius: 8px;
            flex-shrink: 0;
            display: none;
            border: 2px solid #0d6efd;
            background: #fff;
        }

        .global-table { table-layout: fixed; width: 100%; margin: 0; }
        .global-table th, .global-table td { padding: 10px; vertical-align: middle; }
        .global-table th { background-color: #0d6efd !important; color: #fff; position: sticky; top: 0; z-index: 10; }

        .col-db { width: 70px; }
        .col-name { width: auto; }
        .col-field { width: 30%; }
        .col-rank { width: 70px; text-align: center; }
        .col-if { width: 70px; text-align: center; }

        .global-table td.field-cell {
            white-space: normal !important;
            word-break: break-all;
            line-height: 1.2;
            font-size: 0.95rem;
        }

        /* 4. 选项卡与主表布局 */
        .nav-tabs { flex-shrink: 0; }
        .filter-bar { background: #f8f9fa; padding: 10px; border-radius: 8px; margin: 10px 0; border: 1px solid #eee; flex-shrink: 0; }
        .tab-content { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; }
        .tab-pane.active { display: flex; flex-direction: column; height: 100%; }
        .table-wrap { flex-grow: 1; overflow-y: auto; border: 1px solid #eee; border-radius: 4px; }

        /* 主表样式 */
        .table { font-size: 0.85rem; width: 100%; margin: 0; table-layout: fixed; }
        .table thead th {
            position: sticky; top: 0; background: #f8f9fa; z-index: 5;
            border-bottom: 2px solid #dee2e6; padding: 10px 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .table tbody td {
            padding: 8px 6px;
            word-wrap: break-word;
            word-break: break-word;
            white-space: normal;
            vertical-align: top;
            line-height: 1.3;
        }

        /* ========= CCF 表格 - 极度压缩级别和IF ========= */
        #table-ccf {
            table-layout: fixed;
        }
        #table-ccf th:nth-child(1), #table-ccf td:nth-child(1) { width: 10%; }  /* 简称 */
        #table-ccf th:nth-child(2), #table-ccf td:nth-child(2) { width: 50%; }  /* 全称 */
        #table-ccf th:nth-child(3), #table-ccf td:nth-child(3) { width: 30%; }  /* 分类 - 最大宽度 */
        #table-ccf th:nth-child(4), #table-ccf td:nth-child(4) { width: 5%; }   /* 级别 - 仅6% */
        #table-ccf th:nth-child(5), #table-ccf td:nth-child(5) { width: 5%; }   /* 影响因子 - 仅8% */

        /* 级别列居中对齐 */
        #table-ccf td:nth-child(4) {
            text-align: center;
            font-weight: 600;
        }

        /* 影响因子列居中对齐 */
        #table-ccf td:nth-child(5) {
            text-align: center;
        }

        /* ========= AJG 表格 ========= */
        #table-ajg {
            table-layout: fixed;
        }
        #table-ajg th:nth-child(1), #table-ajg td:nth-child(1) { width: 38%; }
        #table-ajg th:nth-child(2), #table-ajg td:nth-child(2) { width: 42%; }
        #table-ajg th:nth-child(3), #table-ajg td:nth-child(3) { width: 8%; text-align: center; }
        #table-ajg th:nth-child(4), #table-ajg td:nth-child(4) { width: 12%; text-align: center; }

        /* ========= FMS 表格 ========= */
        #table-fms {
            table-layout: fixed;
        }
        #table-fms th:nth-child(1), #table-fms td:nth-child(1) { width: 38%; }
        #table-fms th:nth-child(2), #table-fms td:nth-child(2) { width: 42%; }
        #table-fms th:nth-child(3), #table-fms td:nth-child(3) { width: 8%; text-align: center; }
        #table-fms th:nth-child(4), #table-fms td:nth-child(4) { width: 12%; text-align: center; }

        .table-hover tbody tr:hover { background-color: #f1f7ff !important; }

        /* 自定义滚动条 */
        .table-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-wrap::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
        .table-wrap::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
        .table-wrap::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        /* 分类标签样式 */
        .field-tag {
            display: inline-block;
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin: 1px;
            white-space: nowrap;
        }

        /* 级别徽章 */
        .rank-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.75rem;
        }
        .rank-A { background: #d1e7dd; color: #0a5a3e; }
        .rank-B { background: #fff3cd; color: #856404; }
        .rank-C { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="top-bar">
        <h2><i class="bi bi-search"></i> 期刊查询系统</h2>
        <div class="search-box">
            <div class="input-group input-group-sm">
                <input type="text" id="globalSearchInput" class="form-control border-0 bg-transparent" placeholder="搜索期刊（支持多关键词，空格分隔）" onkeyup="if(event.keyCode===13) executeGlobalSearch()">
                <button class="btn btn-primary rounded-2 px-4 ms-2" onclick="executeGlobalSearch()">全局检索</button>
            </div>
        </div>
    </div>

    <div id="globalResult"></div>

    <ul class="nav nav-tabs" id="myTab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#panel-ajg">AJG 2024</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#panel-ccf">CCF 2026</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#panel-fms">FMS 2025</button></li>
    </ul>

    <div class="tab-content" id="myTabContent">
        <div class="tab-pane fade show active" id="panel-ajg" role="tabpanel">
            <div class="filter-bar row g-2 m-0">
                <div class="col-4"><label class="small fw-bold text-muted">期刊搜索</label><input type="text" id="search-ajg" class="form-control" oninput="filterTable('ajg')" placeholder="输入期刊名称关键词..."></div>
                <div class="col-4"><label class="small fw-bold text-muted">学科分类</label><select id="field-ajg" class="form-select" onchange="filterTable('ajg')"><option value="">全部</option></select></div>
                <div class="col-4"><label class="small fw-bold text-muted">级别</label><select id="rank-ajg" class="form-select" onchange="filterTable('ajg')"><option value="">全部</option></select></div>
            </div>
            <div class="table-wrap"><table class="table table-hover table-striped" id="table-ajg"><thead></thead><tbody></tbody></table></div>
        </div>

        <div class="tab-pane fade" id="panel-ccf" role="tabpanel">
            <div class="filter-bar row g-2 m-0">
                <div class="col-4"><label class="small fw-bold text-muted">简称/全称搜索</label><input type="text" id="search-ccf" class="form-control" oninput="filterTable('ccf')" placeholder="支持简称或全称关键词..."></div>
                <div class="col-4"><label class="small fw-bold text-muted">领域分类</label><select id="field-ccf" class="form-select" onchange="filterTable('ccf')"><option value="">全部</option></select></div>
                <div class="col-4"><label class="small fw-bold text-muted">级别</label><select id="rank-ccf" class="form-select" onchange="filterTable('ccf')"><option value="">全部</option></select></div>
            </div>
            <div class="table-wrap"><table class="table table-hover table-striped" id="table-ccf"><thead></thead><tbody></tbody></table></div>
        </div>

        <div class="tab-pane fade" id="panel-fms" role="tabpanel">
            <div class="filter-bar row g-2 m-0">
                <div class="col-4"><label class="small fw-bold text-muted">期刊名称搜索</label><input type="text" id="search-fms" class="form-control" oninput="filterTable('fms')" placeholder="输入期刊名称关键词..."></div>
                <div class="col-4"><label class="small fw-bold text-muted">管理学科</label><select id="field-fms" class="form-select" onchange="filterTable('fms')"><option value="">全部</option></select></div>
                <div class="col-4"><label class="small fw-bold text-muted">级别</label><select id="rank-fms" class="form-select" onchange="filterTable('fms')"><option value="">全部</option></select></div>
            </div>
            <div class="table-wrap"><table class="table table-hover table-striped" id="table-fms"><thead></thead><tbody></tbody></table></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let dataAJG = [], dataCCF = [], dataFMS = [];

async function loadAllData() {
    try {
        const [res1, res2, res3] = await Promise.all([
            fetch('data/ajg.json'), fetch('data/ccf.json'), fetch('data/fms.json')
        ]);
        dataAJG = await res1.json();
        dataCCF = await res2.json();
        dataFMS = await res3.json();

        renderTable('ajg', dataAJG, ['Journal Title', 'Field', 'AJG 2024', '影响因子']);
        renderTable('ccf', dataCCF, ['简称', '全称', '分类', '级别', '影响因子']);
        renderTable('fms', dataFMS, ['期刊名称', '学科', 'FMS等级2025', '影响因子']);

        populateFilters();
    } catch (err) { console.error("数据加载失败", err); }
}

function fuzzyMatch(item, keys, query) {
    if (!query) return true;
    const searchStr = keys.map(k => String(item[k] || '')).join(' ').toLowerCase();
    const keywords = query.toLowerCase().split(/\s+/);
    return keywords.every(kw => searchStr.includes(kw));
}

function executeGlobalSearch() {
    const query = document.getElementById('globalSearchInput').value.trim();
    const resultDiv = document.getElementById('globalResult');
    if (!query) { resultDiv.style.display = "none"; return; }

    const resAJG = dataAJG.filter(i => fuzzyMatch(i, ['Journal Title'], query));
    const resCCF = dataCCF.filter(i => fuzzyMatch(i, ['全称', '简称'], query));
    const resFMS = dataFMS.filter(i => fuzzyMatch(i, ['期刊名称'], query));

    const total = resAJG.length + resCCF.length + resFMS.length;
    resultDiv.style.display = "block";

    let html = `
    <div class="bg-light p-2 d-flex justify-content-between border-bottom sticky-top">
        <span class="ms-2">检索到 <b>${total}</b> 条结果</span>
        <button class="btn-close btn-sm me-2" onclick="document.getElementById('globalResult').style.display='none'"></button>
    </div>
    <table class="table table-sm table-hover align-middle mb-0 global-table">
        <thead>
            <tr>
                <th class="col-db">库</th>
                <th class="col-name">期刊全称</th>
                <th class="col-field">分类/学科</th>
                <th class="col-rank">级别</th>
                <th class="col-if">IF</th>
            </tr>
        </thead>
        <tbody>`;

    const pushRows = (list, db) => {
        list.forEach(i => {
            const badge = db === 'AJG' ? 'bg-dark' : (db === 'CCF' ? 'bg-success' : 'bg-warning text-dark');
            const name = db === 'CCF' ? i['全称'] : (i['Journal Title'] || i['期刊名称']);
            const field = i['Field'] || i['分类'] || i['学科'] || '-';
            const rank = i['AJG 2024'] || i['级别'] || i['FMS等级2025'] || i['FMS等级 2025'] || '-';
            html += `十大
                <td><span class="badge ${badge}">${db}</span></td>
                <td title="${name}"><strong>${name}</strong></td>
                <td class="field-cell" title="${field}">${field}</td>
                <td class="text-center"><b class="text-primary">${rank}</b></td>
                <td class="text-center">${i['影响因子'] || '-'}</td>
            </tr>`;
        });
    };
    pushRows(resAJG, 'AJG'); pushRows(resCCF, 'CCF'); pushRows(resFMS, 'FMS');
    html += `</tbody></table>`;
    resultDiv.innerHTML = html;
}

function filterTable(type) {
    const searchVal = document.getElementById(`search-${type}`).value.trim();
    const fieldVal = document.getElementById(`field-${type}`).value;
    const rankVal = document.getElementById(`rank-${type}`).value;

    let source, keys, fKey, rKey, cols;
    if (type === 'ajg') {
        source = dataAJG; keys = ['Journal Title']; fKey = 'Field'; rKey = 'AJG 2024';
        cols = ['Journal Title', 'Field', 'AJG 2024', '影响因子'];
    } else if (type === 'ccf') {
        source = dataCCF; keys = ['全称', '简称']; fKey = '分类'; rKey = '级别';
        cols = ['简称', '全称', '分类', '级别', '影响因子'];
    } else {
        source = dataFMS; keys = ['期刊名称']; fKey = '学科'; rKey = 'FMS等级2025';
        cols = ['期刊名称', '学科', 'FMS等级2025', '影响因子'];
    }

    const filtered = source.filter(i => {
        const mName = fuzzyMatch(i, keys, searchVal);
        const mField = (fieldVal === "" || i[fKey] === fieldVal);
        const curRank = i[rKey] || i['FMS等级 2025'] || "";
        const mRank = (rankVal === "" || curRank === rankVal);
        return mName && mField && mRank;
    });
    renderTable(type, filtered, cols);
}

function renderTable(type, data, cols) {
    const thead = document.querySelector(`#table-${type} thead`);
    const tbody = document.querySelector(`#table-${type} tbody`);
    thead.innerHTML = `</tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr>`;

    if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${cols.length}" class="text-center text-muted py-5">无记录</td></tr>`;
    } else {
        tbody.innerHTML = data.map(row => {
            return `<tr>${cols.map(c => {
                let value = row[c] !== undefined && row[c] !== null && row[c] !== '' ? row[c] : '-';
                // 为长文本添加 title 提示
                return `<td title="${String(value).replace(/"/g, '&quot;')}">${value}</td>`;
            }).join('')}</tr>`;
        }).join('');
    }
}

function populateFilters() {
    const cfgs = [
        { id: 'ajg', data: dataAJG, f: 'Field', r: 'AJG 2024' },
        { id: 'ccf', data: dataCCF, f: '分类', r: '级别' },
        { id: 'fms', data: dataFMS, f: '学科', r: 'FMS等级2025' }
    ];
    cfgs.forEach(c => {
        const fS = document.getElementById(`field-${c.id}`), rS = document.getElementById(`rank-${c.id}`);
        while (fS.options.length > 1) fS.remove(1);
        while (rS.options.length > 1) rS.remove(1);

        [...new Set(c.data.map(i => i[c.f]))].filter(Boolean).sort().forEach(v => fS.add(new Option(v, v)));
        [...new Set(c.data.map(i => i[c.r] || i['FMS等级2025']))].filter(Boolean).sort().forEach(v => rS.add(new Option(v, v)));
    });
}

window.onload = loadAllData;
</script>
</body>
</html>
