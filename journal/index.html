<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Journal List</title>
<style>
:root{
  --bg:#f4f8fc;
  --panel:#ffffff;
  --line:#d7e5f2;
  --line-soft:#e8f1f8;
  --text:#203246;
  --muted:#6f8296;
  --blue:#245f9f;
  --blue-2:#2f7abf;
  --blue-soft:#eaf4ff;
  --link:#183b61;
  --shadow:0 12px 30px rgba(25,71,110,.075);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","Noto Sans SC",Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 10% -6%, rgba(47,122,191,.14), transparent 33%),
    radial-gradient(circle at 92% 2%, rgba(36,95,159,.08), transparent 30%),
    linear-gradient(180deg,#f9fcff 0%, var(--bg) 54%, #eef5fb 100%);
}
.container{max-width:1280px;margin:0 auto;padding:34px 24px 46px}
.header{display:flex;align-items:center;justify-content:space-between;gap:22px;margin-bottom:22px}
.title-group{display:flex;align-items:center;gap:16px;min-width:0;flex:1 1 auto}
h1{margin:0;font-size:30px;letter-spacing:.2px;color:#183b61;font-weight:760}
.header-link{display:inline-flex;align-items:center;white-space:nowrap;text-decoration:none;border:1px solid #bad8e4;background:linear-gradient(180deg,#eef9fb 0%,#e6f3f8 100%);color:#246173;border-radius:999px;padding:8px 14px;font-size:13.5px;font-weight:680;box-shadow:0 5px 14px rgba(36,97,115,.08);transition:all .18s ease}
.header-link:hover{background:#dff2f7;border-color:#8fc4d4;color:#164d5d;transform:translateY(-1px)}
.searchbar{flex:0 1 420px;position:relative}
.searchbar input{
  width:100%;height:42px;border:1px solid var(--line);border-radius:14px;
  background:rgba(255,255,255,.94);color:var(--text);padding:0 16px 0 40px;outline:none;
  box-shadow:0 4px 14px rgba(34,90,140,.05);transition:border .2s, box-shadow .2s, background .2s;
}
.searchbar input:focus{border-color:#91bbe2;box-shadow:0 0 0 4px rgba(47,122,191,.11);background:#fff}
.searchbar:before{content:"";position:absolute;left:15px;top:50%;width:13px;height:13px;border:2px solid #6f8eaa;border-radius:50%;transform:translateY(-50%)}
.searchbar:after{content:"";position:absolute;left:27px;top:27px;width:7px;height:2px;background:#6f8eaa;transform:rotate(45deg);border-radius:2px}
.tabs{display:flex;flex-wrap:wrap;gap:9px;margin:8px 0 22px}
.tab{
  --tab-accent:#4b89c3;
  border:1px solid color-mix(in srgb,var(--tab-accent) 18%, var(--line));
  background:linear-gradient(180deg,rgba(255,255,255,.9),rgba(248,252,255,.92));
  color:color-mix(in srgb,var(--tab-accent) 66%, #263d55);
  border-radius:999px;
  padding:8px 14px;font-size:14px;font-weight:650;cursor:pointer;
  box-shadow:0 3px 10px rgba(30,76,120,.035);
  transition:all .18s ease;
}
.tab:hover{border-color:color-mix(in srgb,var(--tab-accent) 36%, #9cc3e4);background:#fff;transform:translateY(-1px)}
.tab.active{background:linear-gradient(135deg,color-mix(in srgb,var(--tab-accent) 86%, #245f9f),color-mix(in srgb,var(--tab-accent) 66%, #6aa5d8));color:#fff;border-color:transparent;box-shadow:0 8px 18px rgba(36,95,159,.16)}
.tab[data-cat="Elsevier"]{--tab-accent:#3b82c4}
.tab[data-cat="Tourism Related"]{--tab-accent:#2f9a8f}
.tab[data-cat="Springer"]{--tab-accent:#4d7bc7}
.tab[data-cat="IEEE/INFORMS/ACM"]{--tab-accent:#6e78c9}
.tab[data-cat="Wiley/Taylor/WorldScientific"]{--tab-accent:#3f97b2}
.tab[data-cat="Others"]{--tab-accent:#6d8fb3}
.tab[data-cat="中文期刊"]{--tab-accent:#2f8f75}
.content{background:rgba(255,255,255,.78);border:1px solid var(--line-soft);box-shadow:var(--shadow);border-radius:24px;padding:18px}
.category-section{
  --accent:#4f86c6;
  --accent-soft:#dcecff;
  --section-bg:linear-gradient(180deg,rgba(255,255,255,.92) 0%,rgba(248,251,255,.96) 100%);
  padding:15px 15px 17px;margin:0 0 18px;border:1px solid #e5eef7;border-radius:19px;background:var(--section-bg);
  box-shadow:0 8px 22px rgba(28,78,120,.045);
}
.category-section:last-child{margin-bottom:0}
.category-heading{display:flex;align-items:center;gap:10px;margin:0 0 12px;color:#183b61;font-size:17px;font-weight:760;letter-spacing:.1px}
.category-heading:before{content:"";width:5px;height:18px;border-radius:999px;background:var(--accent);display:inline-block}
.category-heading:after{content:"";flex:1 1 auto;height:1px;background:linear-gradient(90deg,color-mix(in srgb,var(--accent) 24%, white),rgba(255,255,255,0));margin-left:6px}
.journal-grid{list-style:none;padding:0;margin:0;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:11px 12px}
.category-section[data-category="中文期刊"] .journal-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
.journal-card{
  min-width:0;display:flex;align-items:center;gap:6px;min-height:38px;padding:7px 11px;
  border:1px solid color-mix(in srgb,var(--accent) 16%, #dde9f4);border-radius:12px;background:rgba(255,255,255,.96);
  box-shadow:0 1px 0 rgba(255,255,255,.7) inset;
  transition:border .18s, box-shadow .18s, transform .18s, background .18s;
}
.journal-card:hover{
  border-color:color-mix(in srgb,var(--accent) 42%, #b7d3ea);
  box-shadow:0 9px 20px rgba(25,71,110,.08),0 0 0 3px color-mix(in srgb,var(--accent) 8%, transparent);
  transform:translateY(-1px);background:#fff;
}
.category-section[data-category="Elsevier"]{--accent:#3b82c4;--accent-soft:#dfeeff;--section-bg:linear-gradient(180deg,#fafdff 0%,#f3f8fd 100%)}
.category-section[data-category="Tourism Related"]{--accent:#2f9a8f;--accent-soft:#def6f1;--section-bg:linear-gradient(180deg,#fbfffe 0%,#f1faf8 100%)}
.category-section[data-category="Springer"]{--accent:#4d7bc7;--accent-soft:#e2ebff;--section-bg:linear-gradient(180deg,#fbfcff 0%,#f4f7fe 100%)}
.category-section[data-category="IEEE/INFORMS/ACM"]{--accent:#6e78c9;--accent-soft:#e7e9ff;--section-bg:linear-gradient(180deg,#fcfcff 0%,#f5f6fe 100%)}
.category-section[data-category="Wiley/Taylor/WorldScientific"]{--accent:#3f97b2;--accent-soft:#def3fa;--section-bg:linear-gradient(180deg,#fbfeff 0%,#f2f9fc 100%)}
.category-section[data-category="Others"]{--accent:#6d8fb3;--accent-soft:#e7f0fa;--section-bg:linear-gradient(180deg,#fcfdff 0%,#f4f7fb 100%)}
.category-section[data-category="中文期刊"]{--accent:#2f8f75;--accent-soft:#def5ed;--section-bg:linear-gradient(180deg,#fbfffd 0%,#f1faf6 100%)}
.journal-link{min-width:0;flex:1 1 auto;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-decoration:none;color:var(--link);font-size:15px;line-height:1.25;font-weight:520}
.category-section[data-category="中文期刊"] .journal-link{font-size:14.5px;font-weight:520}
.journal-link:hover{color:var(--blue-2)}
.extra-link{flex:0 0 auto;padding:3px 7px;border-radius:999px;background:var(--accent-soft);color:color-mix(in srgb,var(--accent) 90%, #214562);border:1px solid color-mix(in srgb,var(--accent) 22%, #cce0f2);text-decoration:none;font-size:11.5px;line-height:1;font-weight:700}
.extra-link:hover{background:color-mix(in srgb,var(--accent-soft) 62%, white);color:color-mix(in srgb,var(--accent) 96%, #174f85)}
.empty{display:none;color:var(--muted);text-align:center;padding:34px 0;font-size:15px}
@media (max-width:1050px){.journal-grid,.category-section[data-category="中文期刊"] .journal-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media (max-width:760px){.container{padding:24px 14px 34px}.header{display:block}.title-group{margin-bottom:14px;gap:10px;flex-wrap:wrap}h1{font-size:26px}.header-link{font-size:13px;padding:7px 12px}.searchbar{order:2;width:100%;max-width:none;flex-basis:100%}.content{padding:12px;border-radius:18px}.category-section{padding:12px;margin-bottom:14px}.journal-grid,.category-section[data-category="中文期刊"] .journal-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.category-heading{font-size:16px}}
@media (max-width:520px){.journal-grid,.category-section[data-category="中文期刊"] .journal-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title-group">
      <h1>Journal List</h1>
      <div class="searchbar"><input id="searchInput" type="search" placeholder="Search journals..." autocomplete="off"></div>
    </div>
    <a class="header-link" href="../submission_system/">期刊投稿审稿系统合集</a>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
</div>
<script>
const state = { data:null, category:'All', query:'' };
const genericExtras = new Set([
  'https://ieeexplore.ieee.org',
  'https://www.nature.com',
  'https://journals.vilniustech.lt',
  'https://www.sciengine.com'
]);
function esc(s){ return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function norm(s){ return String(s??'').toLowerCase().trim(); }
function cleanUrl(url){ return String(url||'').trim().replace(/\/$/,''); }
function isDuplicate(url, mainUrl){ return cleanUrl(url) === cleanUrl(mainUrl); }
function isGenericExtra(url){ return genericExtras.has(cleanUrl(url)); }
function normalizeJournal(j){
  const category = j.category ?? j.Category ?? j['类别'] ?? '';
  const journal = j.journal ?? j.Journal ?? j['Journal Name'] ?? j['期刊名'] ?? j.name ?? '';
  const url = j.url ?? j.URL ?? j['Main Link'] ?? j['Website'] ?? j.website ?? '';
  let extra = j.extra_links ?? j.extraLinks ?? j['Extra Links'] ?? j['Extra Link'] ?? j.extra ?? [];
  if (typeof extra === 'string') {
    extra = extra.split(';').map(part => {
      const v = part.trim();
      if(!v) return null;
      if(v.includes('|')){ const [label, ...rest] = v.split('|'); return {label: label.trim() || 'Link', url: rest.join('|').trim()}; }
      return {label:'Link', url:v};
    }).filter(Boolean);
  }
  if(!Array.isArray(extra)) extra = [];
  const note = j.note ?? j.Note ?? j['备注'] ?? '';
  return {category, journal, url, extra_links: extra, note};
}
function allJournals(){
  return (state.data?.journals||state.data?.Journals||[]).map(normalizeJournal).filter(j => j.category && j.journal);
}
function getCategories(){
  const raw = state.data?.categories || state.data?.Categories;
  if (Array.isArray(raw) && raw.length) return raw;
  return Array.from(new Set(allJournals().map(j=>j.category)));
}
function renderTabs(){
  const tabs = document.getElementById('tabs');
  const cats = ['All', ...getCategories()];
  tabs.innerHTML = cats.map(c => `<button class="tab ${c===state.category?'active':''}" data-cat="${esc(c)}">${esc(c==='All'?'全部':c)}</button>`).join('');
  tabs.querySelectorAll('.tab').forEach(btn => { btn.onclick = () => { state.category = btn.dataset.cat; render(); }; });
}
function filteredItems(cat){
  const q = norm(state.query);
  return allJournals().filter(j => {
    const inCat = cat === 'All' || j.category === cat;
    const text = norm([j.journal, j.category, j.note, j.url, ...(j.extra_links||[]).map(x=>x.label+' '+x.url)].join(' '));
    return inCat && (!q || text.includes(q));
  });
}
function cardHtml(j){
  const extras = (j.extra_links||[])
    .filter(x => x && x.url && !isDuplicate(x.url, j.url) && !isGenericExtra(x.url));
  return `<li class="journal-card" data-title="${esc(norm(j.journal))}">
    <a class="journal-link" href="${esc(j.url)}" title="${esc(j.journal)}" target="_blank" rel="noopener">${esc(j.journal)}</a>
    ${extras.map(x=>`<a class="extra-link" href="${esc(x.url)}" title="${esc(x.label)}" target="_blank" rel="noopener">${esc(x.label)}</a>`).join('')}
  </li>`;
}
function render(){
  renderTabs();
  const content = document.getElementById('content');
  const cats = state.category === 'All' ? getCategories() : [state.category];
  const sections = cats.map(cat => {
    const items = filteredItems(cat);
    if(state.category === 'All' && items.length === 0) return '';
    const heading = state.category === 'All' ? `<div class="category-heading">${esc(cat)}</div>` : '';
    const cards = items.map(cardHtml).join('');
    return `<section class="category-section" data-category="${esc(cat)}">
      ${heading}
      <ul class="journal-grid">${cards}</ul>
      <div class="empty" style="${items.length?'display:none':'display:block'}">No matching journals.</div>
    </section>`;
  }).join('');
  content.innerHTML = sections || '<div class="empty" style="display:block">No matching journals.</div>';
}
fetch('journals.json')
  .then(r => r.json())
  .then(data => { state.data = data; render(); })
  .catch(() => { document.getElementById('content').innerHTML = '<div class="empty" style="display:block">Unable to load journals.json.</div>'; });
document.getElementById('searchInput').addEventListener('input', e => { state.query = e.target.value; render(); });
</script>
</body>
</html>
