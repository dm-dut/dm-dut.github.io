<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal Directory</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      background: #edf1f5;
      color: #1f2937;
      padding: 20px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 18px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 5px;
      letter-spacing: -0.4px;
    }

    .header p {
      color: #6b7280;
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }

    .search-box {
      width: 300px;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
      color: #111827;
    }

    .filter-box {
      width: 200px;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
      color: #111827;
    }

    .search-box:focus,
    .filter-box:focus {
      border-color: #4b5563;
      box-shadow: 0 0 0 3px rgba(75, 85, 99, 0.12);
    }

    .stats {
      margin-bottom: 12px;
      font-size: 13px;
      color: #6b7280;
      padding-left: 2px;
    }

    .table-card {
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #dbe1e8;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .table-wrapper {
      max-height: 78vh;
      overflow-y: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead {
      background: #2f3a4c;
    }

    thead th {
      text-align: left;
      padding: 14px 16px;
      font-size: 13px;
      color: #f8fafc;
      font-weight: 700;
      letter-spacing: 0.3px;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    thead th:nth-child(1) {
      width: 42%;
    }

    thead th:nth-child(2) {
      width: 28%;
    }

    thead th:nth-child(3) {
      width: 30%;
      text-align: center;
    }

    tbody td {
      padding: 13px 16px;
      border-bottom: 1px solid #edf2f7;
      font-size: 14px;
      vertical-align: middle;
      color: #374151;
      word-wrap: break-word;
    }

    tbody tr {
      transition: background 0.18s ease;
    }

    tbody tr:nth-child(even) {
      background: #f8fafc;
    }

    tbody tr:hover {
      background: #eef2f7;
    }

    .journal-name {
      font-weight: 600;
      color: #111827;
      line-height: 1.4;
    }

    .category-tag {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: #e5e7eb;
      color: #374151;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid #d1d5db;
    }

    .website-cell {
      text-align: center;
    }

    .visit-link {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 9px;
      background: #374151;
      color: #ffffff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .visit-link:hover {
      background: #1f2937;
      transform: translateY(-1px);
    }

    .empty-message {
      text-align: center;
      padding: 36px;
      color: #9ca3af;
      font-size: 14px;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f3f4f6;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    @media (max-width: 900px) {
      body {
        padding: 14px;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .search-box,
      .filter-box {
        width: 100%;
      }

      thead th,
      tbody td {
        padding: 12px;
        font-size: 13px;
      }

      .header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>Journal Directory</h1>
      <p>Browse journals, publishers, and websites from the CSV dataset.</p>
    </div>

    <div class="toolbar">
      <input
        type="text"
        id="searchInput"
        class="search-box"
        placeholder="Search journal name or publisher..."
      />

      <select id="categoryFilter" class="filter-box">
        <option value="">All Categories</option>
      </select>
    </div>

    <div class="stats" id="statsText">
      Loading data...
    </div>

    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Journal Name</th>
              <th>Publisher / Category</th>
              <th>Website</th>
            </tr>
          </thead>
          <tbody id="journalTableBody"></tbody>
        </table>

        <div class="empty-message" id="emptyMessage" style="display:none;">
          No matching journals found.
        </div>
      </div>
    </div>
  </div>

  <script>
    const csvFilePath = "journals_directory.csv";
    let allData = [];

    function renderTable(data) {
      const tableBody = document.getElementById("journalTableBody");
      const emptyMessage = document.getElementById("emptyMessage");
      const statsText = document.getElementById("statsText");

      tableBody.innerHTML = "";

      if (data.length === 0) {
        emptyMessage.style.display = "block";
        statsText.textContent = "0 journals displayed";
        return;
      }

      emptyMessage.style.display = "none";

      data.forEach(item => {
        const row = document.createElement("tr");

        const journalName = item["Journal Name"] || "";
        const category = item["Publisher/Category"] || "Unknown";
        const link = item["Link"] || "#";

        row.innerHTML = `
          <td class="journal-name">${journalName}</td>
          <td>
            <span class="category-tag">${category}</span>
          </td>
          <td class="website-cell">
            <a class="visit-link" href="${link}" target="_blank">
              Visit
            </a>
          </td>
        `;

        tableBody.appendChild(row);
      });

      statsText.textContent = `${data.length} journals displayed`;
    }

    function populateCategoryFilter(data) {
      const filter = document.getElementById("categoryFilter");

      const categories = [...new Set(
        data.map(item => item["Publisher/Category"]).filter(Boolean)
      )].sort();

      categories.forEach(category => {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = category;
        filter.appendChild(option);
      });
    }

    function applyFilters() {
      const searchValue = document
        .getElementById("searchInput")
        .value
        .toLowerCase();

      const selectedCategory = document.getElementById("categoryFilter").value;

      const filtered = allData.filter(item => {
        const journal = (item["Journal Name"] || "").toLowerCase();
        const category = (item["Publisher/Category"] || "").toLowerCase();

        const matchesSearch =
          journal.includes(searchValue) ||
          category.includes(searchValue);

        const matchesCategory =
          !selectedCategory ||
          item["Publisher/Category"] === selectedCategory;

        return matchesSearch && matchesCategory;
      });

      renderTable(filtered);
    }

    Papa.parse(csvFilePath, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        console.log(results.data);

        allData = results.data;
        populateCategoryFilter(allData);
        renderTable(allData);

        document
          .getElementById("searchInput")
          .addEventListener("input", applyFilters);

        document
          .getElementById("categoryFilter")
          .addEventListener("change", applyFilters);
      },
      error: function(error) {
        document.getElementById("statsText").textContent =
          "Failed to load CSV data.";
        console.error(error);
      }
    });
  </script>
</body>
</html>
