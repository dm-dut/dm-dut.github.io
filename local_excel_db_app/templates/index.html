<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>本地学术数据维护系统</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand-block">
      <h1>本地学术数据维护系统</h1>
    </div>
    <div class="actions">
      <label class="btn ghost">
        导入基础 Excel
        <input id="importFile" type="file" accept=".xlsx,.xls" hidden />
      </label>
      <label class="btn ghost">
        导入发表记录
        <input id="importPubFile" type="file" accept=".xlsx,.xls" hidden />
      </label>
      <label class="btn ghost">
        导入影响因子库
        <input id="importIfFile" type="file" accept=".xlsx,.xls" hidden />
      </label>
      <a class="btn" href="/api/export/homepage">下载基础 Excel</a>
      <a class="btn" href="/api/export/publications">下载发表记录</a>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="sidebar-title">数据表</div>
      <div id="tableTabs" class="tabs"></div>
    </aside>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h2 id="currentTitle">请选择数据表</h2>
          <div id="currentHint" class="hint"></div>
        </div>
        <div class="toolbar">
          <input id="searchInput" class="search" placeholder="搜索当前表..." />
        </div>
      </div>

      <div id="filterPanel" class="filter-panel"></div>

      <div class="table-wrap">
        <table id="dataTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <h3 id="modalTitle">编辑记录</h3>
        </div>
        <button id="closeModal" class="icon-btn">×</button>
      </div>
      <form id="recordForm" class="form"></form>
      <div class="modal-actions">
        <button id="saveBtn" type="button" class="btn">保存</button>
        <button id="cancelBtn" type="button" class="btn ghost">取消</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
