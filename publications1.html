<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN" "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <link rel="shortcut icon" href="paper_dragon.ico">
    <link rel="stylesheet" type="text/css" href="style.css" />
    <title>Zhen Zhang's Publications</title>
    <script type="text/javascript" src="https://code.jquery.com/jquery-1.11.1.min.js"></script>

    <style type="text/css">
        /* --- 1. 标题风格：复刻浅蓝色大字号 + 下划线 --- */
        h2 {
            font-size: 1.3em;
            color: #527bbd;
            font-weight: bold;
            border-bottom: 2px solid #527bbd;
            padding-bottom: 5px;
            margin: 15px 0 5px 0;
            clear: both;
        }

        /* --- 2. 论文条目与精确间距控制 --- */
        #main_publication_area p {
            margin: 0.5em 0;
            line-height: 1.4;
            text-align: justify;
        }

        /* 每一类第一条记录的段前间距 */
        #main_publication_area h2 + p {
            margin-top: 15px !important;
        }

        /* --- 3. 姓名样式：纯黑加粗 --- */
        .my_name {
            color: #000 !important;
            font-weight: bold !important;
        }

        /* --- 4. New 图标视觉贴合修正 --- */
        .new_icon {
            vertical-align: middle;
            border: none;
            margin-left: -0.5px;
            margin-right: -0.3px;
            padding: 0;
        }

        /* 切换按钮样式 */
        .lang-btn-container { text-align: right; margin-bottom: 5px; margin-top: 10px; }
        #switch-btn {
            cursor: pointer; color: #527bbd; font-weight: bold;
            text-decoration: underline; font-size: 0.9em;
        }
    </style>
</head>

<body>
<h1 style="padding-left: 0.5em"><a href="index.html">Dr. Zhen Zhang's Homepage</a></h1>
<hr>

<table summary="Table for page layout." id="tlayout">
<tr valign="top">
  <td id="layout-menu">
    <div class="menu-item"><a href="index.html">Home</a></div>
    <div class="menu-item"><a href="publications.html">Publications</a></div>
    <div class="menu-item"><a href="service.html">Service</a></div>
    <div class="menu-item"><a href="grants.html">Grants</a></div>
    <div class="menu-item"><a href="award.html">Awards</a></div>
    <div class="menu-item"><a href="groups.html">Group</a></div>
    <div class="menu-item"><a href="news.html">News</a></div>
  </td>

  <td id="layout-content">
    <div class="lang-btn-container">
        <span id="switch-btn">Switch to Chinese (中文版)</span>
    </div>

    <div id="main_publication_area">Loading publications...</div>

    <div id="footer">
        <p>Last updated: <span id="update_time"></span></p>
        <p>&copy; 2014-2026 Zhen Zhang</p>
    </div>
  </td>
</tr>
</table>

<script type="text/javascript">
$(function() {
    var currentLang = 'en';
    var allData = null;

    // 更新页脚时间
    var now = new Date();
    $("#update_time").text(now.getFullYear() + "-" + (now.getMonth()+1) + "-" + now.getDate());

    // 按钮切换点击事件
    $("#switch-btn").click(function() {
        currentLang = (currentLang === 'en' ? 'cn' : 'en');
        $(this).text(currentLang === 'en' ? 'Switch to Chinese (中文版)' : 'Switch to English (英文版)');
        render();
    });

    function render() {
        if(!allData) return;
        var html = "";
        var totalCount = 0;

        // 修正分类名称以匹配 convert.py 输出
        var internalCategories = ["Monograph", "Journal Articles", "Conference Papers"];
        var catDisplayLabels = {
            "en": ["Monograph", "Journal Articles", "Conference Papers"],
            "cn": ["专著", "期刊论文", "会议论文"]
        };

        // 计算总数用于逆序编号
        $.each(internalCategories, function(i, cat) {
            if(allData[cat]) totalCount += allData[cat].length;
        });

        var currentIdx = totalCount;

        $.each(internalCategories, function(i, cat) {
            if(allData[cat] && allData[cat].length > 0) {
                html += '<h2>' + catDisplayLabels[currentLang][i] + '</h2>';
                $.each(allData[cat], function(idx, p) {
                    // 安全获取双语字段，若不存在则降级显示
                    var auths = (currentLang === 'en' ? p.authors_en : p.authors_cn) || p.authors || "";
                    var title = (currentLang === 'en' ? p.title_en : p.title_cn) || p.title || "";
                    var source = (currentLang === 'en' ? p.source_en : p.source_cn) || p.source || "";
                    var noteVal = (currentLang === 'en' ? p.note_en : p.note_cn) || "";

                    // 姓名加粗渲染
                    auths = auths.replace(/Zhen Zhang/g, '<span class="my_name">Zhen Zhang</span>');
                    auths = auths.replace(/张震/g, '<span class="my_name">张震</span>');

                    var idxStr = (currentIdx < 10 ? '0'+currentIdx : currentIdx);
                    html += '<p> [' + idxStr + ']';

                    // New 标签逻辑：前 10 条且非专著
                    if(currentIdx > (totalCount - 10) && cat !== "Monograph") {
                        html += '<img src="images/new.gif" class="new_icon" alt="new" />';
                    } else {
                        html += '&nbsp;';
                    }

                    // 标点处理：期刊逗号，会议句号
                    var punc = (cat === "Journal Articles") ? ", " : ". ";
                    html += auths + '. ' + title + punc;

                    if(cat === "Journal Articles") {
                        html += '<em>' + source + '</em>';
                        if(p.vol) html += ', ' + p.vol;
                        if(p.no) html += '(' + p.no + ')';
                        if(p.page) html += ', ' + p.page;
                        if(p.year) html += ', ' + p.year;
                        if(p.doi && currentLang === 'en') html += '. DOI: ' + p.doi;
                    } else if(cat === "Conference Papers") {
                        var inText = (currentLang === 'en' ? 'In ' : '发表于 ');
                        html += inText + '<em>' + source + '</em>';
                        if(p.year) html += ', ' + p.year;
                    } else if(cat === "Monograph") {
                        html += '<em>' + source + '</em>, ' + p.year;
                    }
                    html += '. ';

                    // Note 与 ESI 处理
                    var notes = [];
                    if(p.metrics) notes.append(p.metrics);
                    if(p.esi_high) notes.push(currentLang === 'en' ? '<strong>ESI Highly Cited Paper</strong>' : '<strong>ESI 高被引论文</strong>');
                    if(noteVal && noteVal !== "nan") notes.push('<strong>' + noteVal + '</strong>');

                    if(notes.length > 0) html += '(' + notes.join(", ") + ') ';

                    // DOI PDF 图标 (仅限期刊和会议)
                    if(p.doi && p.doi !== "" && cat !== "Monograph") {
                        var link = p.doi.indexOf('http') === 0 ? p.doi : 'https://doi.org/' + p.doi;
                        html += '<a href="' + link + '" target="_blank"><img src="images/iconPdf.png" width="23" height="24" style="vertical-align:middle;margin-left:5px;" /></a>';
                    }
                    html += '</p>';
                    currentIdx--;
                });
            }
        });
        $("#main_publication_area").html(html);
    }

    // 核心：加载 JSON 并启动渲染
    $.getJSON("papers.json")
        .done(function(data) {
            allData = data;
            render();
        })
        .fail(function() {
            $("#main_publication_area").html("<span style='color:red;'>Error: Could not load papers.json. Please check the file.</span>");
        });
});
</script>
</body>
</html>
