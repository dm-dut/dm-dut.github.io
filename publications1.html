<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN" "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <link rel="shortcut icon" href="paper_dragon.ico">
    <link rel="stylesheet" type="text/css" href="style.css" />
    <title>Zhen Zhang's Publications</title>
    <script type="text/javascript" src="https://code.jquery.com/jquery-1.11.1.min.js"></script>

    <style type="text/css">
        /* --- 1. 标题风格：保持原有的浅蓝色 --- */
        h2 {
            font-size: 1.3em;
            color: #527bbd;
            font-weight: bold;
            border-bottom: 2px solid #527bbd;
            padding-bottom: 5px;
            margin: 15px 0 5px 0;
            clear: both;
        }

        /* --- 2. 论文条目间距 --- */
        #main_publication_area p {
            margin: 0.5em 0;
            line-height: 1.4;
            text-align: justify;
        }

        #main_publication_area h2 + p {
            margin-top: 25px !important;
        }

        /* --- 3. 姓名加粗 --- */
        .my_name {
            color: #000 !important;
            font-weight: bold !important;
        }

        /* --- 4. New 图标视觉贴合 --- */
        .new_icon {
            vertical-align: middle;
            border: none;
            margin-left: -0.5px;
            margin-right: -0.3px;
            padding: 0;
        }

        /* --- 5. 新增：中英文切换按钮样式 --- */
        .lang-control {
            text-align: right;
            margin-bottom: -10px; /* 紧贴下方内容 */
            padding-right: 10px;
        }
        #switch-btn {
            cursor: pointer;
            color: #527bbd;
            font-weight: bold;
            text-decoration: underline;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
<h1 style="padding-left: 0.5em"><a href="index.html">Dr. Zhen Zhang's Homepage</a></h1>
<hr>

<table summary="Table for page layout." id="tlayout">
<tr valign="top">
  <td id="layout-menu">
    <div class="menu-item"><a href="index.html">Home</a></div>
    <div class="menu-item"><a href="publications.html">Publications</a></div>
    <div class="menu-item"><a href="service.html">Service</a></div>
    <div class="menu-item"><a href="grants.html">Grants</a></div>
    <div class="menu-item"><a href="award.html">Awards</a></div>
    <div class="menu-item"><a href="groups.html">Group</a></div>
    <div class="menu-item"><a href="news.html">News</a></div>
  </td>

  <td id="layout-content">
    <div class="lang-control">
        <span id="switch-btn">Switch to Chinese (中文版)</span>
    </div>

    <div id="main_publication_area">Loading...</div>

    <div id="footer">
        <p>Last updated: <span id="update_time"></span></p>
        <p>&copy; 2014-2026 Zhen Zhang</p>
    </div>
  </td>
</tr>
</table>

<script type="text/javascript">
$(function() {
    var currentLang = 'en'; // 初始语言
    var allData = null;

    // 1. 点击切换事件
    $("#switch-btn").click(function() {
        currentLang = (currentLang === 'en' ? 'cn' : 'en');
        $(this).text(currentLang === 'en' ? 'Switch to Chinese (中文版)' : 'Switch to English (英文版)');
        render();
    });

    // 2. 渲染函数
function render() {
        if(!allData) return;
        var html = "";
        var cats = ["Monograph", "Journal Articles", "Conference Papers"];
        var labels = { "en": ["Monograph", "Journal Articles", "Conference Papers"], "cn": ["专著", "期刊论文", "会议论文"] };

        var total = 0;
        $.each(cats, function(i, c) { if(allData[c]) total += allData[c].length; });
        var currentIdx = total;

        $.each(cats, function(i, cat) {
            if(allData[cat] && allData[cat].length > 0) {
                html += '<h2>' + labels[currentLang][i] + '</h2>';
                $.each(allData[cat], function(idx, p) {
                    // 1. 获取对应语言字段
                    var auths = (currentLang === 'en' ? p.authors_en : p.authors_cn) || "";
                    var title = (currentLang === 'en' ? p.title_en : p.title_cn) || "";
                    var source = (currentLang === 'en' ? p.source_en : p.source_cn) || "";
                    var noteVal = (currentLang === 'en' ? p.note_en : p.note_cn) || "";

                    // 2. 姓名加粗
                    auths = auths.replace(/Zhen Zhang/g, '<span class="my_name">Zhen Zhang</span>')
                                 .replace(/张震/g, '<span class="my_name">张震</span>');

                    var idxStr = (currentIdx < 10 ? '0'+currentIdx : currentIdx);
                    html += '<p> [' + idxStr + '] ';

                    // 3. New 标签
                    if(currentIdx > (total - 10) && cat !== "Monograph") {
                        html += '<img src="images/new.gif" class="new_icon" alt="new" />';
                    }

                    // 4. 标题与作者 (期刊用逗号，会议/专著用句号)
                    var punc = (cat === "Journal Articles") ? ", " : ". ";
                    html += auths + '. ' + title + punc;

                    // 5. 详细出版信息
                    if(cat === "Journal Articles") {
                        html += '<em>' + source + '</em>';
                        if(p.vol) html += ', ' + p.vol;
                        if(p.no) html += '(' + p.no + ')';
                        if(p.page) html += ', ' + p.page;
                        if(p.year) html += ', ' + p.year;
                        // 期刊论文：无论中英文模式都显示 DOI
                        if(p.doi) html += '. DOI: ' + p.doi;
                    } else if(cat === "Conference Papers") {
                        // 会议论文：统一用英文 In
                        html += 'In <em>' + source + '</em>, ' + p.year;
                    } else if(cat === "Monograph") {
                        html += '<em>' + source + '</em>, ' + p.year;
                    }
                    html += '. ';

                    // 6. Note 标注 (ESI, Metrics, 备注)
                    var notes = [];
                    if(p.metrics) notes.push(p.metrics);
                    if(p.esi_high) notes.push(currentLang === 'en' ? '<strong>ESI Highly Cited Paper</strong>' : '<strong>ESI 高被引论文</strong>');
                    if(noteVal && noteVal !== "") notes.push('<strong>' + noteVal + '</strong>');
                    if(notes.length > 0) html += '(' + notes.join(", ") + ') ';

                    // 7. PDF 图标
                    if(p.doi && cat !== "Monograph") {
                        var link = p.doi.indexOf('http') === 0 ? p.doi : 'https://doi.org/' + p.doi;
                        html += '<a href="' + link + '" target="_blank"><img src="images/iconPdf.png" width="23" height="24" style="vertical-align:middle;margin-left:5px;" /></a>';
                    }
                    html += '</p>';
                    currentIdx--;
                });
            }
        });
        $("#main_publication_area").html(html);
    }

    // 3. 数据加载
    $.getJSON("papers.json", function(data) {
        allData = data;
        render();
    }).fail(function() {
        $("#main_publication_area").text("Failed to load papers.json.");
    });

    // 4. 更新页脚时间
    var d = new Date();
    $("#update_time").text(d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate());
});
</script>
</body>
</html>
