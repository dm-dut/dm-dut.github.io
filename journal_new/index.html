<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Journal List</title>
<style>
:root{
  --bg:#f5f8fc;
  --panel:#ffffff;
  --ink:#1f2937;
  --muted:#667085;
  --blue:#22577a;
  --blue2:#2f6f9f;
  --cyan:#e8f3fb;
  --line:#d9e5ef;
  --hover:#f0f7ff;
  --shadow:0 10px 25px rgba(31,78,121,.08);
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
  color:var(--ink);
  background:radial-gradient(circle at top left,#eaf4ff 0,#f5f8fc 36%,#f8fafc 100%);
}
.wrap{max-width:1180px;margin:0 auto;padding:30px 22px 46px;}
.hero{
  background:linear-gradient(135deg,#1f4e79 0%,#2a6f97 60%,#4a90a4 100%);
  color:#fff;border-radius:24px;padding:28px 30px;box-shadow:var(--shadow);
}
.hero h1{margin:0 0 8px;font-size:32px;letter-spacing:.2px;font-weight:760;}
.hero .meta{display:flex;gap:16px;flex-wrap:wrap;color:#eaf6ff;font-size:14px;}
.controls{margin-top:18px;background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.65);border-radius:18px;padding:14px;display:flex;gap:12px;align-items:center;box-shadow:var(--shadow);}
.search{position:relative;flex:1;min-width:260px;}
.search input{width:100%;height:44px;border:1px solid var(--line);border-radius:14px;padding:0 16px 0 42px;font-size:15px;outline:none;background:#fff;color:var(--ink);}
.search input:focus{border-color:#8bb9d6;box-shadow:0 0 0 4px rgba(47,111,159,.12);}
.search:before{content:'⌕';position:absolute;left:16px;top:9px;color:#789;font-size:19px;}
.clear{height:44px;padding:0 16px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--blue);font-weight:650;cursor:pointer;}
.clear:hover{background:var(--hover);}
.tabs{display:flex;gap:9px;flex-wrap:wrap;margin:22px 0 16px;}
.tab{border:1px solid var(--line);background:#fff;color:#335;cursor:pointer;border-radius:999px;padding:9px 14px;font-size:14px;font-weight:650;box-shadow:0 3px 12px rgba(31,78,121,.04);transition:.18s ease;}
.tab:hover{background:var(--hover);transform:translateY(-1px);}
.tab.active{background:var(--blue);border-color:var(--blue);color:white;}
.summary{display:flex;align-items:center;justify-content:space-between;margin:8px 2px 18px;color:var(--muted);font-size:14px;}
.category{margin:22px 0 30px;}
.category-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.category h2{margin:0;color:#183b56;font-size:19px;font-weight:760;}
.count{font-size:13px;color:#5d7285;background:#eaf2f9;border:1px solid #d6e7f2;border-radius:999px;padding:4px 10px;}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;}
.card{min-height:48px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:0;box-shadow:0 4px 14px rgba(31,78,121,.045);transition:.18s ease;overflow:hidden;}
.card:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(31,78,121,.10);border-color:#bcd4e6;background:#fbfdff;}
.card a.title{display:flex;align-items:center;min-height:48px;padding:11px 14px;color:#243447;text-decoration:none;font-weight:640;line-height:1.25;font-size:14.5px;}
.card a.title:hover{color:#1f4e79;}
.card mark{background:#fff0b8;color:inherit;border-radius:4px;padding:0 2px;}
.empty{display:none;background:#fff;border:1px dashed var(--line);border-radius:16px;padding:28px;text-align:center;color:var(--muted);}
.footer{margin-top:24px;color:#7b8794;font-size:13px;text-align:center;}
@media(max-width:1040px){.grid{grid-template-columns:repeat(3,minmax(0,1fr));}}
@media(max-width:760px){.wrap{padding:18px 14px 34px}.hero{border-radius:20px;padding:22px}.hero h1{font-size:26px}.controls{flex-direction:column}.search{width:100%}.clear{width:100%}.grid{grid-template-columns:repeat(2,minmax(0,1fr));}.card a.title{font-size:14px;}}
@media(max-width:480px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>Journal List</h1>
    <div class="meta"><span id="totalText">Loading...</span><span>Excel → JSON driven</span></div>
  </section>
  <div class="controls">
    <div class="search"><input id="searchInput" type="text" placeholder="Search journal names or categories..." autocomplete="off" /></div>
    <button class="clear" id="clearBtn">Clear</button>
  </div>
  <nav class="tabs" id="tabs"></nav>
  <div class="summary"><span id="filterText">All categories</span><span id="matchText"></span></div>
  <main id="content"></main>
  <div class="empty" id="empty">No matching journals found.</div>
  <div class="footer">Update <strong>journal_list.xlsx</strong>, run <strong>update_journals.bat</strong>, and refresh this page.</div>
</div>
<script>
let DATA = {categories:[], journals:[]};
let activeCategory = 'All';
const $ = id => document.getElementById(id);

function escapeHTML(s){return String(s||'').replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function highlight(text, q){
  const safe = escapeHTML(text);
  if(!q) return safe;
  const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'ig');
  return safe.replace(re, m=>`<mark>${m}</mark>`);
}
function countByCat(cat){return DATA.journals.filter(j=>j.category===cat).length;}
function buildTabs(){
  const tabs = ['All', ...DATA.categories];
  $('tabs').innerHTML = tabs.map(cat=>`<button class="tab ${cat===activeCategory?'active':''}" data-cat="${escapeHTML(cat)}">${escapeHTML(cat)} <span>${cat==='All'?DATA.journals.length:countByCat(cat)}</span></button>`).join('');
  document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{activeCategory=btn.dataset.cat; render();}));
}
function render(){
  const q = $('searchInput').value.trim().toLowerCase();
  buildTabs();
  const cats = activeCategory === 'All' ? DATA.categories : [activeCategory];
  let html = '', total = 0;
  cats.forEach(cat=>{
    const items = DATA.journals
      .filter(j=>j.category===cat)
      .filter(j=>!q || (j.journal||'').toLowerCase().includes(q) || (j.category||'').toLowerCase().includes(q));
    if(!items.length) return;
    total += items.length;
    html += `<section class="category" data-category="${escapeHTML(cat)}"><div class="category-head"><h2>${escapeHTML(cat)}</h2><span class="count">${items.length}</span></div><div class="grid">`;
    items.forEach(j=>{
      const href = j.url ? escapeHTML(j.url) : '#';
      html += `<article class="card"><a class="title" href="${href}" target="_blank" rel="noopener">${highlight(j.journal,q)}</a></article>`;
    });
    html += `</div></section>`;
  });
  $('content').innerHTML = html;
  $('empty').style.display = total ? 'none' : 'block';
  $('totalText').textContent = `${DATA.journals.length} journals · ${DATA.categories.length} categories`;
  $('filterText').textContent = activeCategory === 'All' ? 'All categories' : activeCategory;
  $('matchText').textContent = q ? `${total} matched` : `${total} shown`;
}
async function load(){
  try{
    const res = await fetch('journals.json', {cache:'no-store'});
    DATA = await res.json();
    if(!DATA.categories || !DATA.journals) throw new Error('Invalid journals.json');
    render();
  }catch(e){
    $('totalText').textContent = 'Could not load journals.json';
    $('content').innerHTML = '<div class="empty" style="display:block">Please keep index.html and journals.json in the same folder. If opening locally is blocked by your browser, use a local server or GitHub Pages.</div>';
  }
}
$('searchInput').addEventListener('input', render);
$('clearBtn').addEventListener('click',()=>{$('searchInput').value='';activeCategory='All';render();});
load();
</script>
</body>
</html>
