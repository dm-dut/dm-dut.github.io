<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Journal List</title>
<style>
:root{
  --bg:#f4f7fb;
  --panel:#ffffff;
  --ink:#1f2a37;
  --muted:#64748b;
  --primary:#1e5b8c;
  --primary-deep:#16466e;
  --primary-soft:#eaf3fb;
  --accent:#3d7fa6;
  --line:#d7e2ec;
  --line-soft:#e7eef5;
  --shadow:0 10px 24px rgba(30,91,140,.08);
  --shadow-hover:0 16px 30px rgba(30,91,140,.13);
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans","Noto Sans SC",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 10% 0%, rgba(214,234,248,.75), transparent 30%),
    linear-gradient(180deg,#f8fbfe 0%,var(--bg) 48%,#f7fafc 100%);
}
.wrap{max-width:1220px;margin:0 auto;padding:30px 22px 48px;}
.hero{
  background:linear-gradient(135deg,#174b76 0%,#256b98 56%,#5b9bb7 100%);
  color:#fff;
  border-radius:22px;
  padding:24px 28px;
  box-shadow:var(--shadow);
}
.hero h1{margin:0;font-size:31px;letter-spacing:.2px;font-weight:760;}
.controls{
  margin:18px 0 18px;
  display:flex;
  gap:12px;
  align-items:center;
}
.search{position:relative;flex:1;min-width:260px;}
.search input{
  width:100%;height:44px;border:1px solid var(--line);border-radius:14px;
  padding:0 16px 0 42px;font-size:15px;outline:none;background:rgba(255,255,255,.96);
  color:var(--ink);box-shadow:0 6px 18px rgba(30,91,140,.055);
}
.search input:focus{border-color:#8db7d5;box-shadow:0 0 0 4px rgba(30,91,140,.11);}
.search:before{content:'⌕';position:absolute;left:15px;top:8px;color:#7898ad;font-size:20px;}
.clear{
  height:44px;padding:0 18px;border:1px solid var(--line);border-radius:14px;
  background:#fff;color:var(--primary);font-weight:680;cursor:pointer;
  box-shadow:0 6px 18px rgba(30,91,140,.045);
}
.clear:hover{background:var(--primary-soft);}
.tabs{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 20px;}
.tab{
  border:1px solid var(--line);background:rgba(255,255,255,.96);color:#29465d;
  cursor:pointer;border-radius:999px;padding:9px 15px;font-size:14px;font-weight:680;
  box-shadow:0 4px 12px rgba(30,91,140,.045);transition:.18s ease;
}
.tab:hover{background:#f1f7fc;transform:translateY(-1px);border-color:#bfd4e5;}
.tab.active{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 8px 18px rgba(30,91,140,.16);}
.category{margin:22px 0 30px;}
.category-title{margin:0 0 12px;color:#22384a;font-size:18px;font-weight:760;}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;}
.grid.zh{grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;}
.card{
  background:var(--panel);border:1px solid var(--line-soft);border-radius:13px;
  padding:10px 12px 8px;box-shadow:0 5px 14px rgba(30,91,140,.05);
  transition:.18s ease;min-height:66px;display:flex;flex-direction:column;justify-content:space-between;
}
.grid.zh .card{min-height:58px;padding:9px 10px 7px;}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:#b8d0e3;background:#fbfdff;}
.title{
  color:#23384a;text-decoration:none;font-weight:650;line-height:1.28;font-size:14.2px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.grid.zh .title{font-size:14px;line-height:1.25;-webkit-line-clamp:1;}
.title:hover{color:var(--primary-deep);}
.links{margin-top:7px;display:flex;gap:7px;flex-wrap:wrap;line-height:1;}
.links a{
  color:var(--primary);text-decoration:none;font-size:11.5px;font-weight:650;
  border:1px solid #cfe0ee;background:#f4f9fd;border-radius:999px;padding:4px 7px;
}
.links a:hover{background:#e5f0f8;border-color:#accbdf;color:#123f64;}
mark{background:#fff1b8;color:inherit;border-radius:4px;padding:0 2px;}
.empty{display:none;background:#fff;border:1px dashed var(--line);border-radius:16px;padding:28px;text-align:center;color:var(--muted);}
@media(max-width:1120px){.grid{grid-template-columns:repeat(3,minmax(0,1fr));}.grid.zh{grid-template-columns:repeat(4,minmax(0,1fr));}}
@media(max-width:820px){.wrap{padding:20px 14px 36px}.hero{border-radius:18px;padding:21px 22px}.hero h1{font-size:27px}.controls{flex-direction:column}.search,.clear{width:100%;}.grid,.grid.zh{grid-template-columns:repeat(2,minmax(0,1fr));}.card,.grid.zh .card{min-height:62px}.grid.zh .title{-webkit-line-clamp:2;}}
@media(max-width:520px){.grid,.grid.zh{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero"><h1>Journal List</h1></section>
  <div class="controls">
    <div class="search"><input id="searchInput" type="text" placeholder="Search journal names..." autocomplete="off" /></div>
    <button class="clear" id="clearBtn">Clear</button>
  </div>
  <nav class="tabs" id="tabs"></nav>
  <main id="content"></main>
  <div class="empty" id="empty">No matching journals found.</div>
</div>
<script>
let DATA={categories:[],journals:[]};
let activeCategory='All';
const $=id=>document.getElementById(id);
function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function highlight(text,q){const safe=esc(text); if(!q) return safe; const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'ig'); return safe.replace(re,m=>`<mark>${m}</mark>`);}
function buildTabs(){
  const tabs=['All',...DATA.categories];
  $('tabs').innerHTML=tabs.map(cat=>`<button class="tab ${cat===activeCategory?'active':''}" data-cat="${esc(cat)}">${esc(cat)}</button>`).join('');
  document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{activeCategory=btn.dataset.cat;render();}));
}
function linkRow(j){
  const links=[];
  if(j.url) links.push({label:'Website',url:j.url});
  (j.extra_links||[]).forEach(e=>{if(e.url && !links.some(x=>x.url===e.url && x.label===e.label)) links.push({label:e.label||'Link',url:e.url});});
  return `<div class="links">${links.map(x=>`<a href="${esc(x.url)}" target="_blank" rel="noopener">${esc(x.label)}</a>`).join('')}</div>`;
}
function card(j,q){
  const href=j.url?esc(j.url):'#';
  return `<article class="card"><a class="title" href="${href}" target="_blank" rel="noopener">${highlight(j.journal,q)}</a>${linkRow(j)}</article>`;
}
function render(){
  buildTabs();
  const q=$('searchInput').value.trim().toLowerCase();
  const cats=activeCategory==='All'?DATA.categories:[activeCategory];
  let html='',total=0;
  cats.forEach(cat=>{
    const items=DATA.journals.filter(j=>j.category===cat).filter(j=>!q||(j.journal||'').toLowerCase().includes(q));
    if(!items.length) return;
    total+=items.length;
    const zh=cat==='中文期刊';
    const title=(activeCategory==='All')?`<h2 class="category-title">${esc(cat)}</h2>`:'';
    html+=`<section class="category">${title}<div class="grid ${zh?'zh':''}">${items.map(j=>card(j,q)).join('')}</div></section>`;
  });
  $('content').innerHTML=html;
  $('empty').style.display=total?'none':'block';
}
async function load(){
  try{
    const res=await fetch('journals.json',{cache:'no-store'});
    DATA=await res.json();
    if(!DATA.categories||!DATA.journals) throw new Error('Invalid journals.json');
    render();
  }catch(e){
    $('content').innerHTML='<div class="empty" style="display:block">journals.json could not be loaded.</div>';
  }
}
$('searchInput').addEventListener('input',render);
$('clearBtn').addEventListener('click',()=>{$('searchInput').value='';activeCategory='All';render();});
load();
</script>
</body>
</html>
