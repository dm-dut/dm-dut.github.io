<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Journal List</title>
<style>
:root{
  --bg:#f4f8fc;
  --panel:#ffffff;
  --panel-2:#f8fbfe;
  --line:#d8e5f0;
  --line-soft:#eaf1f7;
  --text:#1e3144;
  --muted:#6b7f93;
  --blue:#245f9f;
  --blue-2:#2f7abf;
  --blue-soft:#e8f3ff;
  --link:#183b61;
  --shadow:0 10px 28px rgba(25,71,110,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","Noto Sans SC",Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 8% -8%, rgba(47,122,191,.13), transparent 32%),
    linear-gradient(180deg,#f8fbff 0%, var(--bg) 54%, #eef5fb 100%);
}
.container{
  max-width:1280px;
  margin:0 auto;
  padding:34px 24px 46px;
}
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:22px;
  margin-bottom:22px;
}
h1{
  margin:0;
  font-size:30px;
  letter-spacing:.2px;
  color:#183b61;
  font-weight:760;
}
.searchbar{
  flex:0 1 420px;
  position:relative;
}
.searchbar input{
  width:100%;
  height:42px;
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(255,255,255,.92);
  color:var(--text);
  padding:0 16px 0 40px;
  outline:none;
  box-shadow:0 4px 14px rgba(34,90,140,.05);
  transition:border .2s, box-shadow .2s, background .2s;
}
.searchbar input:focus{
  border-color:#92bbe3;
  box-shadow:0 0 0 4px rgba(47,122,191,.11);
  background:#fff;
}
.searchbar:before{
  content:"";
  position:absolute;
  left:15px;
  top:50%;
  width:13px;
  height:13px;
  border:2px solid #6f8eaa;
  border-radius:50%;
  transform:translateY(-50%);
}
.searchbar:after{
  content:"";
  position:absolute;
  left:27px;
  top:27px;
  width:7px;
  height:2px;
  background:#6f8eaa;
  transform:rotate(45deg);
  border-radius:2px;
}
.tabs{
  display:flex;
  flex-wrap:wrap;
  gap:9px;
  margin:8px 0 20px;
}
.tab{
  border:1px solid var(--line);
  background:rgba(255,255,255,.75);
  color:#315a80;
  border-radius:999px;
  padding:8px 14px;
  font-size:14px;
  font-weight:650;
  cursor:pointer;
  transition:all .18s ease;
}
.tab:hover{
  border-color:#9cc3e4;
  background:#fff;
  transform:translateY(-1px);
}
.tab.active{
  background:linear-gradient(135deg,#245f9f,#2f7abf);
  color:#fff;
  border-color:transparent;
  box-shadow:0 8px 18px rgba(36,95,159,.18);
}
.content{
  background:rgba(255,255,255,.72);
  border:1px solid var(--line-soft);
  box-shadow:var(--shadow);
  border-radius:22px;
  padding:18px;
}
.category-section{display:none}
.category-section.active{display:block}
.journal-grid{
  list-style:none;
  padding:0;
  margin:0;
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px 12px;
}
.category-section[data-category="中文期刊"] .journal-grid{
  grid-template-columns:repeat(4,minmax(0,1fr));
}
.journal-card{
  min-width:0;
  display:flex;
  align-items:center;
  gap:6px;
  min-height:38px;
  padding:8px 10px;
  border:1px solid var(--line-soft);
  border-radius:12px;
  background:linear-gradient(180deg,#fff 0%,#fbfdff 100%);
  transition:border .18s, box-shadow .18s, transform .18s, background .18s;
}
.journal-card:hover{
  border-color:#b7d3ea;
  box-shadow:0 8px 18px rgba(25,71,110,.08);
  transform:translateY(-1px);
  background:#fff;
}
.journal-link{
  min-width:0;
  flex:1 1 auto;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
  text-decoration:none;
  color:var(--link);
  font-size:14px;
  line-height:1.25;
  font-weight:620;
}
.journal-link:hover{color:var(--blue-2)}
.extra-link{
  flex:0 0 auto;
  padding:3px 7px;
  border-radius:999px;
  background:var(--blue-soft);
  color:#286093;
  border:1px solid #cce0f2;
  text-decoration:none;
  font-size:11px;
  line-height:1;
  font-weight:700;
}
.extra-link:hover{
  background:#dceeff;
  color:#174f85;
}
.empty{
  display:none;
  color:var(--muted);
  text-align:center;
  padding:34px 0;
  font-size:15px;
}
@media (max-width:1050px){
  .journal-grid,
  .category-section[data-category="中文期刊"] .journal-grid{
    grid-template-columns:repeat(3,minmax(0,1fr));
  }
}
@media (max-width:760px){
  .container{padding:24px 14px 34px}
  .header{display:block}
  h1{font-size:26px;margin-bottom:14px}
  .searchbar{width:100%;max-width:none}
  .content{padding:12px;border-radius:18px}
  .journal-grid,
  .category-section[data-category="中文期刊"] .journal-grid{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }
}
@media (max-width:520px){
  .journal-grid,
  .category-section[data-category="中文期刊"] .journal-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Journal List</h1>
    <div class="searchbar"><input id="searchInput" type="search" placeholder="Search journals..." autocomplete="off"></div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
</div>
<script>
const state = { data:null, category:'All', query:'' };

function esc(s){ return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function norm(s){ return String(s??'').toLowerCase().trim(); }
function isDuplicate(url, mainUrl){ return String(url||'').trim().replace(/\/$/,'') === String(mainUrl||'').trim().replace(/\/$/,''); }

function renderTabs(){
  const tabs = document.getElementById('tabs');
  const cats = ['All', ...(state.data?.categories||[])];
  tabs.innerHTML = cats.map(c => `<button class="tab ${c===state.category?'active':''}" data-cat="${esc(c)}">${esc(c==='All'?'全部':c)}</button>`).join('');
  tabs.querySelectorAll('.tab').forEach(btn => {
    btn.onclick = () => { state.category = btn.dataset.cat; render(); };
  });
}

function filteredItems(cat){
  const q = norm(state.query);
  return (state.data?.journals||[]).filter(j => {
    const inCat = cat === 'All' || j.category === cat;
    const text = norm([j.journal, j.category, j.note, j.url, ...(j.extra_links||[]).map(x=>x.label)].join(' '));
    return inCat && (!q || text.includes(q));
  });
}

function render(){
  renderTabs();
  const content = document.getElementById('content');
  const cats = state.category === 'All' ? (state.data.categories||[]) : [state.category];
  content.innerHTML = cats.map(cat => {
    const items = filteredItems(cat);
    const cards = items.map(j => {
      const extras = (j.extra_links||[]).filter(x => x && x.url && !isDuplicate(x.url, j.url)).slice(0,2);
      return `<li class="journal-card" data-title="${esc(norm(j.journal))}">
        <a class="journal-link" href="${esc(j.url)}" title="${esc(j.journal)}" target="_blank" rel="noopener">${esc(j.journal)}</a>
        ${extras.map(x=>`<a class="extra-link" href="${esc(x.url)}" title="${esc(x.label)}" target="_blank" rel="noopener">${esc(x.label)}</a>`).join('')}
      </li>`;
    }).join('');
    return `<section class="category-section active" data-category="${esc(cat)}">
      <ul class="journal-grid">${cards}</ul>
      <div class="empty" style="${items.length?'display:none':'display:block'}">No matching journals.</div>
    </section>`;
  }).join('');
}

fetch('journals.json')
  .then(r => r.json())
  .then(data => { state.data = data; render(); })
  .catch(() => {
    document.getElementById('content').innerHTML = '<div class="empty" style="display:block">Unable to load journals.json.</div>';
  });

document.getElementById('searchInput').addEventListener('input', e => {
  state.query = e.target.value;
  render();
});
</script>
</body>
</html>
