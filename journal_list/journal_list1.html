<script>
let dataAJG = [], dataCCF = [], dataFMS = [], dataJCR = [];

let currentPageData = {
    ajg: [],
    ccf: [],
    fms: [],
    jcr: []
};

let currentPageNo = {
    ajg: 1,
    ccf: 1,
    fms: 1,
    jcr: 1
};

const PAGE_SIZE = {
    ajg: 200,
    ccf: 200,
    fms: 200,
    jcr: 200
};

let filterTimers = {};

const PRIORITY_JCR_CATEGORY = "OPERATIONS RESEARCH & MANAGEMENT SCIENCE";

const JCR_COLS = [
    'Journal name',
    'ISSN',
    'eISSN',
    'Category',
    'Edition',
    '2025 JIF',
    '5-year JIF',
    'JIF quartile',
    'JIF rank'
];

function norm(v) {
    return String(v ?? '')
        .trim()
        .replace(/\u3000/g, ' ')
        .replace(/\s+/g, ' ')
        .toLowerCase();
}

function normCategory(v) {
    return norm(v).replace(/&/g, 'and');
}

function getVal(item, keys) {
    for (const k of keys) {
        if (item[k] !== undefined && item[k] !== null && String(item[k]).trim() !== '') {
            return String(item[k]).trim();
        }
    }

    return '';
}

function escapeHTML(v) {
    return String(v ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function fuzzyMatch(item, keys, query) {
    const q = norm(query);

    if (!q) {
        return true;
    }

    const searchStr = norm(keys.map(k => getVal(item, [k])).join(' '));
    const keywords = q.split(/\s+/).filter(Boolean);

    return keywords.every(kw => searchStr.includes(kw));
}

function debouncedFilterTable(type) {
    clearTimeout(filterTimers[type]);

    filterTimers[type] = setTimeout(() => {
        filterTable(type);
    }, 180);
}

function valueMatch(item, keys, selectedVal) {
    const selected = norm(selectedVal);

    if (!selected) {
        return true;
    }

    const actual = norm(getVal(item, keys));

    if (!actual) {
        return false;
    }

    if (actual === selected) {
        return true;
    }

    const parts = actual
        .split(/[;,，；、|/]/)
        .map(s => s.trim())
        .filter(Boolean);

    return parts.includes(selected);
}

function categoryMatch(item, selectedVal) {
    const selected = normCategory(selectedVal);

    if (!selected) {
        return true;
    }

    const actual = normCategory(getVal(item, ['Category']));

    if (!actual) {
        return false;
    }

    return actual === selected;
}

async function loadJSON(path) {
    const res = await fetch(path + '?v=' + Date.now());

    if (!res.ok) {
        throw new Error(path + ' 加载失败：' + res.status);
    }

    return await res.json();
}

async function loadAllData() {
    try {
        const [res1, res2, res3, res4] = await Promise.all([
            loadJSON('data/ajg.json'),
            loadJSON('data/ccf.json'),
            loadJSON('data/fms.json'),
            loadJSON('data/jcr.json')
        ]);

        dataAJG = res1;
        dataCCF = res2;
        dataFMS = res3;
        dataJCR = res4;

        populateFilters();

        renderPagedTable('ajg', dataAJG, 1);
        renderPagedTable('ccf', dataCCF, 1);
        renderPagedTable('fms', dataFMS, 1);
        renderPagedTable('jcr', dataJCR, 1);

        document.querySelectorAll('[data-bs-toggle="tab"]').forEach(tabEl => {
            tabEl.addEventListener('shown.bs.tab', function (event) {
                const target = event.target.getAttribute("data-bs-target");

                if (target === "#panel-ajg") {
                    resetAndShowFullTable("ajg");
                } else if (target === "#panel-ccf") {
                    resetAndShowFullTable("ccf");
                } else if (target === "#panel-fms") {
                    resetAndShowFullTable("fms");
                } else if (target === "#panel-jcr") {
                    resetAndShowFullTable("jcr");
                }

                window.dispatchEvent(new Event("resize"));
            });
        });

    } catch (err) {
        console.error("数据加载失败", err);
        alert("数据加载失败，请检查 data/ajg.json、data/ccf.json、data/fms.json、data/jcr.json 路径是否正确。");
    }
}

function executeGlobalSearch() {
    const query = document.getElementById('globalSearchInput').value.trim();
    const resultDiv = document.getElementById('globalResult');

    if (!query) {
        resultDiv.style.display = "none";
        resultDiv.innerHTML = "";
        return;
    }

    const resAJG = dataAJG.filter(i =>
        fuzzyMatch(i, ['Journal Title', 'Field', 'AJG 2024', '影响因子'], query)
    );

    const resCCF = dataCCF.filter(i =>
        fuzzyMatch(i, ['全称', '简称', '分类', '级别', '影响因子'], query)
    );

    const resFMS = dataFMS.filter(i =>
        fuzzyMatch(i, ['期刊名称', '学科', 'FMS等级2025', 'FMS等级 2025', '影响因子'], query)
    );

    const total = resAJG.length + resCCF.length + resFMS.length;
    resultDiv.style.display = "block";

    let html = `
        <div class="bg-light p-2 d-flex justify-content-between border-bottom sticky-top">
            <span class="ms-2">检索到 <b>${total}</b> 条结果</span>
            <button class="btn-close btn-sm me-2" onclick="document.getElementById('globalResult').style.display='none'"></button>
        </div>

        <table class="table table-sm table-hover align-middle mb-0 global-table">
            <thead>
                <tr>
                    <th class="col-db">库</th>
                    <th class="col-name">期刊全称</th>
                    <th class="col-field">分类 / 学科</th>
                    <th class="col-rank">级别</th>
                    <th class="col-if">IF</th>
                </tr>
            </thead>
            <tbody>
    `;

    const pushRows = (list, db) => {
        list.forEach(i => {
            const badge = db === 'AJG'
                ? 'db-ajg'
                : (db === 'CCF' ? 'db-ccf' : 'db-fms');

            const name = db === 'CCF'
                ? getVal(i, ['全称'])
                : getVal(i, ['Journal Title', '期刊名称']);

            const field = getVal(i, ['Field', '分类', '学科']) || '-';
            const rank = getVal(i, ['AJG 2024', '级别', 'FMS等级2025', 'FMS等级 2025']) || '-';
            const impact = getVal(i, ['影响因子']) || '-';

            html += `
                <tr>
                    <td><span class="badge ${badge}">${db}</span></td>
                    <td title="${escapeHTML(name)}"><strong>${escapeHTML(name)}</strong></td>
                    <td class="field-cell" title="${escapeHTML(field)}">${escapeHTML(field)}</td>
                    <td class="text-center"><b class="text-primary">${escapeHTML(rank)}</b></td>
                    <td class="text-center">${escapeHTML(impact)}</td>
                </tr>
            `;
        });
    };

    pushRows(resAJG, 'AJG');
    pushRows(resCCF, 'CCF');
    pushRows(resFMS, 'FMS');

    if (total === 0) {
        html += `<tr><td colspan="5" class="text-center text-muted py-4">无记录</td></tr>`;
    }

    html += `</tbody></table>`;
    resultDiv.innerHTML = html;
}

function resetAndShowFullTable(type) {
    const searchInput = document.getElementById(`search-${type}`);
    const fieldSelect = document.getElementById(`field-${type}`);
    const rankSelect = document.getElementById(`rank-${type}`);

    if (searchInput) {
        searchInput.value = "";
    }

    if (fieldSelect) {
        fieldSelect.value = "";
    }

    if (rankSelect) {
        rankSelect.value = "";
    }

    if (type === "ajg") {
        renderPagedTable("ajg", dataAJG, 1);
    } else if (type === "ccf") {
        renderPagedTable("ccf", dataCCF, 1);
    } else if (type === "fms") {
        renderPagedTable("fms", dataFMS, 1);
    } else if (type === "jcr") {
        renderPagedTable("jcr", dataJCR, 1);
    }
}

function getCols(type) {
    if (type === 'ajg') {
        return ['Journal Title', 'Field', 'AJG 2024', '影响因子'];
    }

    if (type === 'ccf') {
        return ['简称', '全称', '分类', '级别', '影响因子'];
    }

    if (type === 'fms') {
        return ['期刊名称', '学科', 'FMS等级2025', '影响因子'];
    }

    return JCR_COLS;
}

function renderPagedTable(type, data, page = 1) {
    currentPageData[type] = data || [];

    const total = currentPageData[type].length;
    const pageSize = PAGE_SIZE[type] || 200;
    const totalPages = Math.max(1, Math.ceil(total / pageSize));

    currentPageNo[type] = Math.min(Math.max(1, page), totalPages);

    const start = (currentPageNo[type] - 1) * pageSize;
    const end = start + pageSize;
    const pageData = currentPageData[type].slice(start, end);

    renderTable(type, pageData, getCols(type));
    updatePageInfo(type, total, start, Math.min(end, total), totalPages);
}

function updatePageInfo(type, total, start, end, totalPages) {
    const info = document.getElementById(`${type}ResultInfo`);
    const pageInfo = document.getElementById(`${type}PageInfo`);
    const prevBtn = document.getElementById(`${type}PrevBtn`);
    const nextBtn = document.getElementById(`${type}NextBtn`);

    if (info) {
        if (total === 0) {
            info.innerHTML = `共 <span class="count">0</span> 条结果`;
        } else {
            info.innerHTML = `共 <span class="count">${total}</span> 条结果，当前显示第 <span class="count">${start + 1}</span>–<span class="count">${end}</span> 条`;
        }
    }

    if (pageInfo) {
        pageInfo.textContent = `第 ${currentPageNo[type]} / ${totalPages} 页`;
    }

    if (prevBtn) {
        prevBtn.disabled = currentPageNo[type] <= 1;
    }

    if (nextBtn) {
        nextBtn.disabled = currentPageNo[type] >= totalPages;
    }
}

function changePage(type, delta) {
    renderPagedTable(type, currentPageData[type], currentPageNo[type] + delta);
}

function filterTable(type) {
    const searchVal = document.getElementById(`search-${type}`).value.trim();
    const fieldVal = document.getElementById(`field-${type}`).value;
    const rankVal = document.getElementById(`rank-${type}`).value;

    let source, keys, fKeys, rKeys;

    if (type === 'ajg') {
        source = dataAJG;
        keys = ['Journal Title'];
        fKeys = ['Field'];
        rKeys = ['AJG 2024'];

    } else if (type === 'ccf') {
        source = dataCCF;
        keys = ['全称', '简称'];
        fKeys = ['分类'];
        rKeys = ['级别'];

    } else if (type === 'fms') {
        source = dataFMS;
        keys = ['期刊名称'];
        fKeys = ['学科'];
        rKeys = ['FMS等级2025', 'FMS等级 2025'];

    } else {
        source = dataJCR;
        keys = ['Journal name', 'ISSN', 'eISSN'];
        fKeys = ['Category'];
        rKeys = ['JIF quartile'];
    }

    const filtered = source.filter(i => {
        const mName = fuzzyMatch(i, keys, searchVal);
        const mField = type === 'jcr'
            ? categoryMatch(i, fieldVal)
            : valueMatch(i, fKeys, fieldVal);
        const mRank = valueMatch(i, rKeys, rankVal);

        return mName && mField && mRank;
    });

    renderPagedTable(type, filtered, 1);
}

function renderTable(type, data, cols) {
    const thead = document.querySelector(`#table-${type} thead`);
    const tbody = document.querySelector(`#table-${type} tbody`);

    thead.innerHTML = `<tr>${cols.map(c => `<th>${escapeHTML(c)}</th>`).join('')}</tr>`;

    if (!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${cols.length}" class="text-center text-muted py-5">无记录</td></tr>`;
        return;
    }

    tbody.innerHTML = data.map(row => {
        return `<tr>${cols.map(c => {
            let value = getVal(row, [c]);

            if (!value && c === 'FMS等级2025') {
                value = getVal(row, ['FMS等级2025', 'FMS等级 2025']);
            }

            if (!value) {
                value = '-';
            }

            return `<td title="${escapeHTML(value)}">${formatCell(c, value)}</td>`;
        }).join('')}</tr>`;
    }).join('');
}

function rankClass(value) {
    const v = String(value || '').trim().toLowerCase();

    if (v === 't1') {
        return 'rank-t1';
    }

    if (v === 't2') {
        return 'rank-t2';
    }

    if (v === 'a' || v === 'a*' || v === '4' || v === '4*') {
        return 'rank-a';
    }

    if (v === 'b' || v === '3') {
        return 'rank-b';
    }

    if (v === 'c' || v === '2') {
        return 'rank-c';
    }

    if (v === 'd' || v === '1') {
        return 'rank-d';
    }

    if (v === 'q1') {
        return 'rank-q1';
    }

    if (v === 'q2') {
        return 'rank-q2';
    }

    if (v === 'q3') {
        return 'rank-q3';
    }

    if (v === 'q4') {
        return 'rank-q4';
    }

    return 'rank-other';
}

function formatCell(col, value) {
    const v = value || '-';

    if (
        col === '级别' ||
        col === 'AJG 2024' ||
        col === 'FMS等级2025' ||
        col === 'FMS等级 2025' ||
        col === 'JIF quartile'
    ) {
        return `<span class="badge-rank ${rankClass(v)}">${escapeHTML(v)}</span>`;
    }

    if (
        (col === '影响因子' ||
         col === '2025 JIF' ||
         col === '5-year JIF') &&
        v !== '-'
    ) {
        return `<span class="if-badge">${escapeHTML(v)}</span>`;
    }

    if (col === 'Edition' && v !== '-') {
        return `<span class="edition-badge">${escapeHTML(v)}</span>`;
    }

    return escapeHTML(v);
}

function populateFilters() {
    const cfgs = [
        {
            id: 'ajg',
            data: dataAJG,
            fKeys: ['Field'],
            rKeys: ['AJG 2024']
        },
        {
            id: 'ccf',
            data: dataCCF,
            fKeys: ['分类'],
            rKeys: ['级别']
        },
        {
            id: 'fms',
            data: dataFMS,
            fKeys: ['学科'],
            rKeys: ['FMS等级2025', 'FMS等级 2025']
        },
        {
            id: 'jcr',
            data: dataJCR,
            fKeys: ['Category'],
            rKeys: ['JIF quartile']
        }
    ];

    cfgs.forEach(c => {
        const fS = document.getElementById(`field-${c.id}`);
        const rS = document.getElementById(`rank-${c.id}`);

        while (fS.options.length > 1) {
            fS.remove(1);
        }

        if (c.id !== 'jcr') {
            while (rS.options.length > 1) {
                rS.remove(1);
            }
        }

        let fields = [...new Set(
            c.data
                .map(i => getVal(i, c.fKeys))
                .filter(Boolean)
        )];

        if (c.id === 'jcr') {
            fields = fields.sort((a, b) => {
                const aPriority = normCategory(a) === normCategory(PRIORITY_JCR_CATEGORY) ? 0 : 1;
                const bPriority = normCategory(b) === normCategory(PRIORITY_JCR_CATEGORY) ? 0 : 1;

                if (aPriority !== bPriority) {
                    return aPriority - bPriority;
                }

                return a.localeCompare(b);
            });
        } else {
            fields = fields.sort((a, b) => a.localeCompare(b));
        }

        fields.forEach(v => fS.add(new Option(v, v)));

        if (c.id !== 'jcr') {
            const ranks = [...new Set(
                c.data
                    .map(i => getVal(i, c.rKeys))
                    .filter(Boolean)
            )].sort();

            ranks.forEach(v => rS.add(new Option(v, v)));
        }
    });
}

window.addEventListener('load', loadAllData);
</script>
