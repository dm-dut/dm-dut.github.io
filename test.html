<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>期刊目录查询系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        /* 1. 基础字号与背景优化 */
        body {
            background-color: #f1f3f5;
            font-family: "Segoe UI", system-ui, sans-serif;
            margin: 0;
            padding: 20px; /* 增加页面边距 */
            overflow: hidden;
            font-size: 1.1rem; /* 整体字体放大 */
        }

        /* 2. 居中容器：限制最大宽度并居中 */
        .main-card {
            background: #fff;
            max-width: 1400px; /* 限制宽度，防止超宽屏下太散 */
            margin: 0 auto;    /* 水平居中 */
            height: calc(100vh - 40px);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
        }

        /* 3. 顶部与搜索框放大 */
        .top-bar { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; flex-shrink: 0; }
        h2 { font-size: 1.5rem; font-weight: bold; margin: 0; color: #0d6efd; white-space: nowrap; }
        .search-box { flex-grow: 1; background: #f8fbff; border: 1px solid #dee2e6; border-left: 5px solid #0d6efd; border-radius: 6px; padding: 8px 15px; }

        /* 输入框高度适配大字体 */
        .input-group-sm > .form-control, .input-group-sm > .btn {
            font-size: 1.1rem;
            padding: 8px 15px;
        }

        /* 4. 标签页放大 */
        .nav-tabs .nav-link { font-size: 1.1rem; padding: 10px 25px; color: #555; font-weight: 600; border: none; }
        .nav-tabs .nav-link.active { color: #0d6efd; border-bottom: 4px solid #0d6efd; background: none; }

        /* 5. 过滤行优化 */
        .filter-bar { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #eee; flex-shrink: 0; }
        .filter-bar label { font-size: 0.95rem; font-weight: bold; color: #666; margin-bottom: 6px; display: block; }
        .filter-bar select, .filter-bar input { font-size: 1.05rem; height: 42px; padding: 5px 12px; }

        /* 6. 表格与滚动逻辑（严格保留滚动特性） */
        .table-wrap {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #eee;
            position: relative;
            border-radius: 4px;
        }

        .table { font-size: 1.05rem; width: 100%; margin: 0; table-layout: fixed; }
        .table thead th {
            position: sticky;
            top: 0;
            background: #f8f9fa;
            z-index: 5;
            border-bottom: 2px solid #dee2e6;
            padding: 12px 10px;
            font-weight: 600;
        }
        .table tbody td {
            padding: 12px 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-bottom: 1px solid #f2f2f2;
        }

        /* 7. 自定义列宽（确保期刊名有足够空间） */
        /* AJG */
        #table-ajg th:nth-child(1) { width: 40%; }
        #table-ajg th:nth-child(2) { width: 20%; }
        #table-ajg th:nth-child(3), #table-ajg th:nth-child(4), #table-ajg th:nth-child(5) { width: 10%; text-align: center; }

        /* CCF */
        #table-ccf th:nth-child(2) { width: 40%; }

        /* FMS */
        #table-fms th:nth-child(1) { width: 35%; }

        /* 斑马纹增强可读性 */
        .table-hover tbody tr:hover { background-color: #f1f7ff !important; }

        #globalResult { flex-shrink: 0; font-size: 1.1rem; }
        .badge { font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="main-card shadow">
    <div class="top-bar">
        <h2><i class="bi bi-journal-check"></i> 期刊查询系统</h2>
        <div class="search-box">
            <div class="input-group input-group-sm">
                <input type="text" id="globalSearchInput" class="form-control" placeholder="输入简称或全称进行跨库匹配..." onkeyup="if(event.keyCode===13) executeGlobalSearch()">
                <button class="btn btn-primary px-4" onclick="executeGlobalSearch()">匹配查询</button>
            </div>
        </div>
    </div>

    <div id="globalResult"></div>

    <ul class="nav nav-tabs mb-3" id="myTab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#panel-ajg">AJG 2024</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#panel-ccf">CCF 2026</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#panel-fms">FMS 2025</button></li>
    </ul>

    <div class="tab-content" id="myTabContent" style="flex-grow: 1; overflow: hidden;">

        <div class="tab-pane fade show active" id="panel-ajg" role="tabpanel" style="height: 100%; display: flex; flex-direction: column;">
            <div class="filter-bar row g-3 m-0">
                <div class="col-4"><label><i class="bi bi-search"></i> 期刊搜索</label><input type="text" id="search-ajg" class="form-control" oninput="filterTable('ajg')"></div>
                <div class="col-4"><label><i class="bi bi-funnel"></i> 学科分类</label><select id="field-ajg" class="form-select" onchange="filterTable('ajg')"><option value="">全部学科</option></select></div>
                <div class="col-4"><label><i class="bi bi-trophy"></i> 级别筛选</label><select id="rank-ajg" class="form-select" onchange="filterTable('ajg')"><option value="">全部级别</option></select></div>
            </div>
            <div class="table-wrap"><table class="table table-hover table-striped" id="table-ajg"><thead></thead><tbody></tbody></table></div>
        </div>

        <div class="tab-pane fade" id="panel-ccf" role="tabpanel" style="height: 100%; display: flex; flex-direction: column;">
            <div class="filter-bar row g-3 m-0">
                <div class="col-4"><label>简称/全称搜索</label><input type="text" id="search-ccf" class="form-control" oninput="filterTable('ccf')"></div>
                <div class="col-4"><label>分类</label><select id="field-ccf" class="form-select" onchange="filterTable('ccf')"><option value="">全部</option></select></div>
                <div class="col-4"><label>级别</label><select id="rank-ccf" class="form-select" onchange="filterTable('ccf')"><option value="">全部</option></select></div>
            </div>
            <div class="table-wrap"><table class="table table-hover table-striped" id="table-ccf"><thead></thead><tbody></tbody></table></div>
        </div>

        <div class="tab-pane fade" id="panel-fms" role="tabpanel" style="height: 100%; display: flex; flex-direction: column;">
            <div class="filter-bar row g-3 m-0">
                <div class="col-4"><label>期刊名称</label><input type="text" id="search-fms" class="form-control" oninput="filterTable('fms')"></div>
                <div class="col-4"><label>学科</label><select id="field-fms" class="form-select" onchange="filterTable('fms')"><option value="">全部</option></select></div>
                <div class="col-4"><label>级别</label><select id="rank-fms" class="form-select" onchange="filterTable('fms')"><option value="">全部</option></select></div>
            </div>
            <div class="table-wrap"><table class="table table-hover table-striped" id="table-fms"><thead></thead><tbody></tbody></table></div>
        </div>

    </div>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
/** * 1. 数据定义与加载
 */
let dataAJG = [], dataCCF = [], dataFMS = [];

// 使用 Fetch API 从本地 JSON 文件加载数据
async function loadAllData() {
    try {
        const [res1, res2, res3] = await Promise.all([
            fetch('data/ajg.json'), // 请确保文件名一致
            fetch('data/ccf.json'),
            fetch('data/fms.json')
        ]);

        if (!res1.ok || !res2.ok || !res3.ok) throw new Error("文件读取失败，请检查路径");

        dataAJG = await res1.json();
        dataCCF = await res2.json();
        dataFMS = await res3.json();

        // 首次渲染
        renderAllTables();
        populateFilters();
        console.log("所有数据加载成功！");
    } catch (err) {
        console.error(err);
        document.getElementById('globalResult').innerHTML = `<div class="alert alert-danger">数据加载失败：${err.message}。请确保使用 Web Server 访问。</div>`;
    }
}

/** * 2. 表格渲染逻辑

 */
function renderAllTables() {
    renderTable('ajg', dataAJG, ['Journal Title', 'Field', 'AJG 2024', 'AJG 2021', 'AJG 2018', '影响因子']);
    renderTable('ccf', dataCCF, ['简称', '全称', '分类', '级别', '影响因子']);
    renderTable('fms', dataFMS, ['期刊名称', '学科', 'FMS等级2025', 'FMS等级2022', 'FMS等级2020', '影响因子']);
}

function renderTable(type, data, cols) {
    const table = document.getElementById(`table-${type}`);
    const thead = table.querySelector('thead');
    const tbody = table.querySelector('tbody');

    // 生成表头
    thead.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr>`;

    // 生成行内容
    if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${cols.length}" class="text-center text-muted">无匹配数据</td></tr>`;
        return;
    }

    tbody.innerHTML = data.map(row => `
        <tr>${cols.map(c => `<td>${row[c] || '-'}</td>`).join('')}</tr>
    `).join('');
}

/** * 3. 过滤逻辑
 */
function filterTable(type) {
    const searchVal = document.getElementById(`search-${type}`).value.toLowerCase().trim();
    const fieldVal = document.getElementById(`field-${type}`).value;
    const rankVal = document.getElementById(`rank-${type}`).value;

    let sourceData, nameKey, fieldKey, rankKey, cols;

    if (type === 'ajg') {
        sourceData = dataAJG; nameKey = 'Journal Title'; fieldKey = 'Field'; rankKey = 'AJG 2024';
        cols = ['Journal Title', 'Field', 'AJG 2024', '影响因子'];
    } else if (type === 'ccf') {
        sourceData = dataCCF; nameKey = '全称'; fieldKey = '分类'; rankKey = '级别';
        cols = ['简称', '全称', '分类', '级别', '影响因子'];
    } else {
        sourceData = dataFMS; nameKey = '期刊名称'; fieldKey = '学科'; rankKey = 'FMS等级2025';
        cols = ['期刊名称', '学科', 'FMS等级2025', '影响因子'];
    }

    const filtered = sourceData.filter(item => {
        // CCF 特殊处理，同时搜简称和全称
        const nameMatch = type === 'ccf'
            ? (item['全称']||'').toLowerCase().includes(searchVal) || (item['简称']||'').toLowerCase().includes(searchVal)
            : (item[nameKey]||'').toLowerCase().includes(searchVal);

        const fieldMatch = fieldVal === "" || item[fieldKey] === fieldVal;
        const rankMatch = rankVal === "" || item[rankKey] === rankVal;
        return nameMatch && fieldMatch && rankMatch;
    });

    renderTable(type, filtered, cols);
}

/** * 4. 综合查询逻辑
 */
function executeGlobalSearch() {
    const query = document.getElementById('globalSearchInput').value.toLowerCase().trim();
    if (!query) {
        document.getElementById('globalResult').innerHTML = "";
        return;
    }

    // 跨表查找
    const matchAJG = dataAJG.find(i => (i['Journal Title']||'').toLowerCase().includes(query));
    const matchCCF = dataCCF.find(i => (i['全称']||'').toLowerCase().includes(query) || (i['简称']||'').toLowerCase().includes(query));
    const matchFMS = dataFMS.find(i => (i['期刊名称']||'').toLowerCase().includes(query));

    if (!matchAJG && !matchCCF && !matchFMS) {
        document.getElementById('globalResult').innerHTML = `<div class="alert alert-warning mb-0">未在库中找到包含 "<strong>${query}</strong>" 的期刊。</div>`;
        return;
    }

    let html = `
    <div class="table-responsive">
        <table class="table table-bordered align-middle">
            <thead class="table-secondary">
                <tr><th>体系</th><th>匹配期刊全称</th><th>学科/分类</th><th>等级/分级</th><th>影响因子</th></tr>
            </thead>
            <tbody>`;

    if (matchAJG) html += `<tr><td><span class="badge bg-dark">AJG</span></td><td>${matchAJG['Journal Title']}</td><td>${matchAJG['Field']}</td><td><b class="text-primary">${matchAJG['AJG 2024']}</b></td><td>${matchAJG['影响因子']}</td></tr>`;
    if (matchCCF) html += `<tr><td><span class="badge bg-success">CCF</span></td><td>${matchCCF['全称']}</td><td>${matchCCF['分类']}</td><td><b class="text-primary">${matchCCF['级别']}</b></td><td>${matchCCF['影响因子']}</td></tr>`;
    if (matchFMS) html += `<tr><td><span class="badge bg-warning text-dark">FMS</span></td><td>${matchFMS['期刊名称']}</td><td>${matchFMS['学科']}</td><td><b class="text-primary">${matchFMS['FMS等级 2025']}</b></td><td>${matchFMS['影响因子']}</td></tr>`;

    html += `</tbody></table></div>`;
    document.getElementById('globalResult').innerHTML = html;
}

/** * 5. 下拉列表初始化
 */
function populateFilters() {
    const configs = [
        { id: 'ajg', data: dataAJG, field: 'Field', rank: 'AJG 2024' },
        { id: 'ccf', data: dataCCF, field: '分类', rank: '级别' },
        { id: 'fms', data: dataFMS, field: '学科', rank: 'FMS等级2025' }
    ];

    configs.forEach(conf => {
        const fields = [...new Set(conf.data.map(i => i[conf.field]))].filter(Boolean).sort();
        const ranks = [...new Set(conf.data.map(i => i[conf.rank]))].filter(Boolean).sort();

        const fSelect = document.getElementById(`field-${conf.id}`);
        const rSelect = document.getElementById(`rank-${conf.id}`);

        fields.forEach(f => fSelect.add(new Option(f, f)));
        ranks.forEach(r => rSelect.add(new Option(r, r)));
    });
}

// 启动
window.onload = loadAllData;
</script>

</body>
</html>
