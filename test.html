<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期刊目录查询系统</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>期刊目录查询系统</h1>
        <p>支持 AJG、CCF、FMS 三类期刊目录查询与综合检索</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('ajg', this)">AJG</button>
        <button class="tab-btn" onclick="switchTab('ccf', this)">CCF</button>
        <button class="tab-btn" onclick="switchTab('fms', this)">FMS</button>
        <button class="tab-btn" onclick="switchTab('search', this)">综合查询</button>
    </div>

    <div id="table-panel" class="panel">

        <div class="filter-card">

            <div class="filter-group">
                <label>期刊名称</label>
                <input type="text" id="keyword" placeholder="请输入期刊名称关键词">
            </div>

            <div class="filter-group">
                <label>分类</label>
                <select id="category">
                    <option value="">全部分类</option>
                </select>
            </div>

            <div class="filter-group">
                <label>等级</label>
                <select id="level">
                    <option value="">全部等级</option>
                </select>
            </div>

            <div class="filter-actions">
                <button class="search-btn" onclick="loadTable()">查询</button>
                <button class="reset-btn" onclick="resetFilters()">重置</button>
            </div>

        </div>

        <div id="table-container" class="table-card"></div>

    </div>

    <div id="search-panel" class="panel" style="display:none;">

        <div class="search-card">
            <div class="search-row">
                <input type="text" id="search-journal" placeholder="请输入完整或部分期刊名称">
                <button class="search-btn" onclick="searchJournal()">综合查询</button>
            </div>
        </div>

        <div id="search-result" class="table-card"></div>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
