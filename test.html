<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期刊目录综合查询系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #0d6efd;
            --bg-body: #f0f2f5;
        }

        body { background-color: var(--bg-body); font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; color: #333; }

        /* 容器美化 */
        .container {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-top: 40px;
            margin-bottom: 60px;
        }

        /* 标题样式 */
        h2 { font-weight: 700; letter-spacing: 1px; margin-bottom: 30px; }

        /* 搜索卡片增强 */
        .global-search-card {
            border: none;
            border-left: 6px solid var(--primary-color);
            background-color: #f8fbff;
            transition: transform 0.2s;
        }
        .global-search-card:hover { transform: translateY(-2px); }

        /* 过滤区域 */
        .filter-section {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #edf2f7;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        /* 选项卡美化 */
        .nav-tabs { border-bottom: 2px solid #edf2f7; }
        .nav-tabs .nav-link {
            border: none;
            padding: 12px 25px;
            font-size: 1.05rem;
            transition: all 0.3s;
        }
        .nav-tabs .nav-link:hover { background-color: #f8f9fa; }
        .nav-tabs .nav-link.active {
            color: var(--primary-color);
            background: none;
            border-bottom: 3px solid var(--primary-color);
        }

        /* 表格列宽与样式控制 */
        .table-container {
            max-height: 600px;
            overflow-y: auto;
            border-radius: 8px;
            border: 1px solid #edf2f7;
        }

        .table { margin-bottom: 0; vertical-align: middle; }
        .table thead th {
            background-color: #f8f9fa;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            padding: 12px 10px;
            border-bottom: 2px solid #dee2e6;
            white-space: nowrap;
        }

        /* 固定列宽逻辑 */
        /* AJG 表格列宽 */
        #table-ajg th:nth-child(1) { width: 45%; } /* Journal Title */
        #table-ajg th:nth-child(2) { width: 25%; } /* Field */
        #table-ajg th:nth-child(3) { width: 15%; } /* AJG 2024 */
        #table-ajg th:nth-child(4) { width: 15%; } /* 影响因子 */

        /* CCF 表格列宽 */
        #table-ccf th:nth-child(1) { width: 15%; } /* 简称 */
        #table-ccf th:nth-child(2) { width: 35%; } /* 全称 */
        #table-ccf th:nth-child(3) { width: 20%; } /* 分类 */
        #table-ccf th:nth-child(4) { width: 15%; } /* 级别 */
        #table-ccf th:nth-child(5) { width: 15%; } /* 影响因子 */

        /* FMS 表格列宽 */
        #table-fms th:nth-child(1) { width: 35%; } /* 期刊名称 */
        #table-fms th:nth-child(2) { width: 20%; } /* 学科 */
        #table-fms th:nth-child(3),
        #table-fms th:nth-child(4),
        #table-fms th:nth-child(5) { width: 10%; text-align: center; } /* 等级列们 */
        #table-fms th:nth-child(6) { width: 15%; } /* 影响因子 */

        .table tbody td { padding: 12px 10px; font-size: 0.95rem; }

        /* 滚动条美化 */
        .table-container::-webkit-scrollbar { width: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }
        .table-container::-webkit-scrollbar-track { background: #f7fafc; }

        .badge-system { padding: 5px 10px; border-radius: 6px; font-weight: 600; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center text-primary"><i class="bi bi-journal-bookmark-fill"></i> 期刊目录综合查询系统</h2>
    <p class="text-center text-muted mb-5">Decision Sciences & Operations Research 专家工具</p>

    <div class="card mb-5 global-search-card shadow-sm">
        <div class="card-body p-4">
            <h5 class="card-title mb-3"><i class="bi bi-lightning-charge"></i> 跨库综合匹配</h5>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                <input type="text" id="globalSearchInput" class="form-control form-control-lg border-start-0" placeholder="搜索期刊全称或简称（例如：Omega 或 Management Science）" onkeyup="if(event.keyCode===13) executeGlobalSearch()">
                <button class="btn btn-primary btn-lg px-5" onclick="executeGlobalSearch()">查询</button>
            </div>
            <div id="globalResult" class="mt-4"></div>
        </div>
    </div>

    <ul class="nav nav-tabs mb-4" id="journalTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-ajg"><i class="bi bi-table"></i> AJG 2024</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-ccf"><i class="bi bi-table"></i> CCF</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-fms"><i class="bi bi-table"></i> FMS 2025</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-ajg">
            <div class="row g-3 filter-section shadow-sm align-items-end">
                <div class="col-md-5">
                    <label class="form-label small fw-bold">期刊检索</label>
                    <input type="text" class="form-control" id="search-ajg" placeholder="输入名称关键字..." oninput="filterTable('ajg')">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold">学科分类</label>
                    <select class="form-select" id="field-ajg" onchange="filterTable('ajg')"><option value="">全部学科</option></select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold">AJG 级别</label>
                    <select class="form-select" id="rank-ajg" onchange="filterTable('ajg')"><option value="">全部等级</option></select>
                </div>
            </div>
            <div class="table-container shadow-sm"><table class="table table-hover" id="table-ajg"><thead></thead><tbody></tbody></table></div>
        </div>

        <div class="tab-pane fade" id="tab-ccf">
            <div class="row g-3 filter-section shadow-sm align-items-end">
                <div class="col-md-5">
                    <label class="form-label small fw-bold">简称/全称检索</label>
                    <input type="text" class="form-control" id="search-ccf" placeholder="输入关键字..." oninput="filterTable('ccf')">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold">领域分类</label>
                    <select class="form-select" id="field-ccf" onchange="filterTable('ccf')"><option value="">全部分类</option></select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold">CCF 级别</label>
                    <select class="form-select" id="rank-ccf" onchange="filterTable('ccf')"><option value="">全部等级</option></select>
                </div>
            </div>
            <div class="table-container shadow-sm"><table class="table table-hover" id="table-ccf"><thead></thead><tbody></tbody></table></div>
        </div>

        <div class="tab-pane fade" id="tab-fms">
            <div class="row g-3 filter-section shadow-sm align-items-end">
                <div class="col-md-5">
                    <label class="form-label small fw-bold">期刊名检索</label>
                    <input type="text" class="form-control" id="search-fms" placeholder="输入名称..." oninput="filterTable('fms')">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold">管理学分支</label>
                    <select class="form-select" id="field-fms" onchange="filterTable('fms')"><option value="">全部学科</option></select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold">FMS 级别</label>
                    <select class="form-select" id="rank-fms" onchange="filterTable('fms')"><option value="">全部等级</option></select>
                </div>
            </div>
            <div class="table-container shadow-sm"><table class="table table-hover" id="table-fms"><thead></thead><tbody></tbody></table></div>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
/** * 1. 数据定义与加载
 */
let dataAJG = [], dataCCF = [], dataFMS = [];

// 使用 Fetch API 从本地 JSON 文件加载数据
async function loadAllData() {
    try {
        const [res1, res2, res3] = await Promise.all([
            fetch('data/ajg.json'), // 请确保文件名一致
            fetch('data/ccf.json'),
            fetch('data/fms.json')
        ]);

        if (!res1.ok || !res2.ok || !res3.ok) throw new Error("文件读取失败，请检查路径");

        dataAJG = await res1.json();
        dataCCF = await res2.json();
        dataFMS = await res3.json();

        // 首次渲染
        renderAllTables();
        populateFilters();
        console.log("所有数据加载成功！");
    } catch (err) {
        console.error(err);
        document.getElementById('globalResult').innerHTML = `<div class="alert alert-danger">数据加载失败：${err.message}。请确保使用 Web Server 访问。</div>`;
    }
}

/** * 2. 表格渲染逻辑
 */
function renderAllTables() {
    renderTable('ajg', dataAJG, ['Journal Title', 'Field', 'AJG 2024', '影响因子']);
    renderTable('ccf', dataCCF, ['简称', '全称', '分类', '级别', '影响因子']);
    renderTable('fms', dataFMS, ['期刊名称', '学科', 'FMS等级2025', 'FMS等级2022', 'FMS等级2020', '影响因子']);
}

function renderTable(type, data, cols) {
    const table = document.getElementById(`table-${type}`);
    const thead = table.querySelector('thead');
    const tbody = table.querySelector('tbody');

    // 生成表头
    thead.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr>`;

    // 生成行内容
    if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${cols.length}" class="text-center text-muted">无匹配数据</td></tr>`;
        return;
    }

    tbody.innerHTML = data.map(row => `
        <tr>${cols.map(c => `<td>${row[c] || '-'}</td>`).join('')}</tr>
    `).join('');
}

/** * 3. 过滤逻辑
 */
function filterTable(type) {
    const searchVal = document.getElementById(`search-${type}`).value.toLowerCase().trim();
    const fieldVal = document.getElementById(`field-${type}`).value;
    const rankVal = document.getElementById(`rank-${type}`).value;

    let sourceData, nameKey, fieldKey, rankKey, cols;

    if (type === 'ajg') {
        sourceData = dataAJG; nameKey = 'Journal Title'; fieldKey = 'Field'; rankKey = 'AJG 2024';
        cols = ['Journal Title', 'Field', 'AJG 2024', '影响因子'];
    } else if (type === 'ccf') {
        sourceData = dataCCF; nameKey = '全称'; fieldKey = '分类'; rankKey = '级别';
        cols = ['简称', '全称', '分类', '级别', '影响因子'];
    } else {
        sourceData = dataFMS; nameKey = '期刊名称'; fieldKey = '学科'; rankKey = 'FMS等级2025';
        cols = ['期刊名称', '学科', 'FMS等级2025', '影响因子'];
    }

    const filtered = sourceData.filter(item => {
        // CCF 特殊处理，同时搜简称和全称
        const nameMatch = type === 'ccf'
            ? (item['全称']||'').toLowerCase().includes(searchVal) || (item['简称']||'').toLowerCase().includes(searchVal)
            : (item[nameKey]||'').toLowerCase().includes(searchVal);

        const fieldMatch = fieldVal === "" || item[fieldKey] === fieldVal;
        const rankMatch = rankVal === "" || item[rankKey] === rankVal;
        return nameMatch && fieldMatch && rankMatch;
    });

    renderTable(type, filtered, cols);
}

/** * 4. 综合查询逻辑
 */
function executeGlobalSearch() {
    const query = document.getElementById('globalSearchInput').value.toLowerCase().trim();
    if (!query) {
        document.getElementById('globalResult').innerHTML = "";
        return;
    }

    // 跨表查找
    const matchAJG = dataAJG.find(i => (i['Journal Title']||'').toLowerCase().includes(query));
    const matchCCF = dataCCF.find(i => (i['全称']||'').toLowerCase().includes(query) || (i['简称']||'').toLowerCase().includes(query));
    const matchFMS = dataFMS.find(i => (i['期刊名称']||'').toLowerCase().includes(query));

    if (!matchAJG && !matchCCF && !matchFMS) {
        document.getElementById('globalResult').innerHTML = `<div class="alert alert-warning mb-0">未在库中找到包含 "<strong>${query}</strong>" 的期刊。</div>`;
        return;
    }

    let html = `
    <div class="table-responsive">
        <table class="table table-bordered align-middle">
            <thead class="table-secondary">
                <tr><th>体系</th><th>匹配期刊全称</th><th>学科/分类</th><th>等级/分级</th><th>影响因子</th></tr>
            </thead>
            <tbody>`;

    if (matchAJG) html += `<tr><td><span class="badge bg-dark">AJG</span></td><td>${matchAJG['Journal Title']}</td><td>${matchAJG['Field']}</td><td><b class="text-primary">${matchAJG['AJG 2024']}</b></td><td>${matchAJG['影响因子']}</td></tr>`;
    if (matchCCF) html += `<tr><td><span class="badge bg-success">CCF</span></td><td>${matchCCF['全称']}</td><td>${matchCCF['分类']}</td><td><b class="text-primary">${matchCCF['级别']}</b></td><td>${matchCCF['影响因子']}</td></tr>`;
    if (matchFMS) html += `<tr><td><span class="badge bg-warning text-dark">FMS</span></td><td>${matchFMS['期刊名称']}</td><td>${matchFMS['学科']}</td><td><b class="text-primary">${matchFMS['FMS等级 2025']}</b></td><td>${matchFMS['影响因子']}</td></tr>`;

    html += `</tbody></table></div>`;
    document.getElementById('globalResult').innerHTML = html;
}

/** * 5. 下拉列表初始化
 */
function populateFilters() {
    const configs = [
        { id: 'ajg', data: dataAJG, field: 'Field', rank: 'AJG 2024' },
        { id: 'ccf', data: dataCCF, field: '分类', rank: '级别' },
        { id: 'fms', data: dataFMS, field: '学科', rank: 'FMS等级2025' }
    ];

    configs.forEach(conf => {
        const fields = [...new Set(conf.data.map(i => i[conf.field]))].filter(Boolean).sort();
        const ranks = [...new Set(conf.data.map(i => i[conf.rank]))].filter(Boolean).sort();

        const fSelect = document.getElementById(`field-${conf.id}`);
        const rSelect = document.getElementById(`rank-${conf.id}`);

        fields.forEach(f => fSelect.add(new Option(f, f)));
        ranks.forEach(r => rSelect.add(new Option(r, r)));
    });
}

// 启动
window.onload = loadAllData;
</script>

</body>
</html>
